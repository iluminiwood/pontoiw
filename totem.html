<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Batidas Digital">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Batidas Digital</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0a0a0c;color:#e4e4e8;
  display:flex;flex-direction:column;
  height:100dvh;
}
.acc{color:#f0c040;}
.g{color:#3dd68c;}
.r{color:#f87171;}

/* ===== HEADER / RELÓGIO ===== */
.header{padding:2rem 1.5rem 1rem;text-align:center;flex-shrink:0;}
.brand{font-size:12px;font-weight:800;letter-spacing:.1em;color:#666;text-transform:uppercase;margin-bottom:1.25rem;}
.clock{font-family:'SF Mono',Menlo,monospace;font-size:56px;font-weight:700;color:#fff;letter-spacing:-1px;line-height:1;}
.date{font-size:14px;color:#8888a0;margin-top:.5rem;text-transform:capitalize;}

/* ===== GRID DE FUNCIONÁRIOS ===== */
.main{flex:1;overflow-y:auto;padding:1rem 1.5rem 2rem;}
.subtitle{text-align:center;font-size:14px;color:#8888a0;margin-bottom:1.5rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:14px;max-width:900px;margin:0 auto;}
.func-card{
  background:#111114;border:1px solid #222228;border-radius:20px;
  padding:1.5rem 1rem;display:flex;flex-direction:column;align-items:center;gap:.75rem;
  cursor:pointer;transition:transform .12s,background .12s;
}
.func-card:active{transform:scale(.95);background:#18181c;}
.avatar{
  width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;color:#0a0a0c;
}
.func-nome{font-size:14px;font-weight:700;color:#fff;text-align:center;}
.func-cargo{font-size:11px;color:#666;text-align:center;}

.empty-state, .error-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;text-align:center;padding:2rem;gap:.75rem;
}
.empty-state .ic, .error-state .ic{font-size:48px;}
.empty-state .msg, .error-state .msg{font-size:15px;color:#8888a0;max-width:300px;}

/* ===== MODAL DE PIN ===== */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.88);
  display:none;align-items:center;justify-content:center;
  z-index:100;padding:1.5rem;
}
.overlay.open{display:flex;}
.pin-card{
  background:#111114;border-radius:28px;padding:2rem 1.75rem;
  width:100%;max-width:340px;text-align:center;
  border:1px solid #222228;
}
.pin-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#0a0a0c;margin:0 auto 1rem;}
.pin-nome{font-size:18px;font-weight:800;color:#fff;margin-bottom:.3rem;}
.pin-sub{font-size:13px;color:#8888a0;margin-bottom:1.5rem;}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:1.75rem;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #333;transition:all .15s;}
.pin-dot.filled{background:#f0c040;border-color:#f0c040;}
.pin-dots.shake{animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.pin-key{
  aspect-ratio:1;border-radius:18px;background:#18181c;border:1px solid #26262c;
  font-size:24px;font-weight:700;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.pin-key:active{background:#222228;transform:scale(.94);}
.pin-key.ghost{background:transparent;border:none;}
.pin-cancel{margin-top:1.25rem;font-size:13px;color:#666;cursor:pointer;padding:.5rem;}

/* ===== CONFIRMAÇÃO ===== */
.confirm-overlay{
  position:fixed;inset:0;z-index:200;display:none;
  align-items:center;justify-content:center;flex-direction:column;gap:1rem;
  text-align:center;padding:2rem;
}
.confirm-overlay.open{display:flex;}
.confirm-overlay.ok{background:rgba(10,30,20,.97);}
.confirm-overlay.err{background:rgba(35,10,10,.97);}
.confirm-icon{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
.confirm-overlay.ok .confirm-icon{background:rgba(61,214,140,.18);color:#3dd68c;}
.confirm-overlay.err .confirm-icon{background:rgba(248,113,113,.18);color:#f87171;}
@keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.confirm-title{font-size:24px;font-weight:800;color:#fff;}
.confirm-sub{font-size:15px;color:#aaa;}
.confirm-hora{font-family:'SF Mono',Menlo,monospace;font-size:32px;font-weight:700;margin-top:.5rem;}
</style>
</head>
<body>

<div class="header">
  <div class="brand">IW · Batidas Digital</div>
  <div class="clock" id="clock">--:--:--</div>
  <div class="date" id="dateLbl">—</div>
</div>

<div class="main" id="main">
  <div class="subtitle">Toque no seu nome pra bater o ponto</div>
  <div class="grid" id="grid"></div>
</div>

<!-- MODAL PIN -->
<div class="overlay" id="pinOverlay">
  <div class="pin-card">
    <div class="pin-avatar" id="pinAvatar"></div>
    <div class="pin-nome" id="pinNome"></div>
    <div class="pin-sub">Digite seu PIN de 4 dígitos</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-pad" id="pinPad">
      <button class="pin-key" data-k="1">1</button>
      <button class="pin-key" data-k="2">2</button>
      <button class="pin-key" data-k="3">3</button>
      <button class="pin-key" data-k="4">4</button>
      <button class="pin-key" data-k="5">5</button>
      <button class="pin-key" data-k="6">6</button>
      <button class="pin-key" data-k="7">7</button>
      <button class="pin-key" data-k="8">8</button>
      <button class="pin-key" data-k="9">9</button>
      <div class="pin-key ghost"></div>
      <button class="pin-key" data-k="0">0</button>
      <button class="pin-key" data-k="del">⌫</button>
    </div>
    <div class="pin-cancel" onclick="fecharPin()">Cancelar</div>
  </div>
</div>

<!-- CONFIRMAÇÃO -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-icon" id="confirmIcon">✓</div>
  <div class="confirm-title" id="confirmTitle"></div>
  <div class="confirm-sub" id="confirmSub"></div>
  <div class="confirm-hora" id="confirmHora"></div>
</div>

<script>
const SB_URL='https://mcoemytfdrfrtbfbpvqr.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jb2VteXRmZHJmcnRiZmJwdnFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTgyODcsImV4cCI6MjA5NTM3NDI4N30.uJZKW5oUlexLo_XENDCohlchGKlG54Pwt0gvqpuy-i8';
const sb=window.supabase.createClient(SB_URL,SB_KEY);

const params=new URLSearchParams(window.location.search);
const TOKEN=params.get('t');

const COLORS=['#60a5fa','#3dd68c','#f0c040','#f87171','#c084fc','#fb923c','#34d399','#a8a29e'];
let funcionarios=[];
let pinAtual='';
let funcSelecionado=null;

function corPara(idx){return COLORS[idx%COLORS.length];}

function atualizarRelogio(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('dateLbl').textContent=now.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
}
atualizarRelogio();
setInterval(atualizarRelogio,1000);

async function carregarFuncionarios(){
  const main=document.getElementById('main');
  if(!TOKEN){
    main.innerHTML='<div class="error-state"><div class="ic">🔒</div><div class="msg">Link inválido. Peça o link correto ao administrador do sistema.</div></div>';
    return;
  }
  const{data,error}=await sb.rpc('listar_funcionarios_kiosk',{p_token:TOKEN});
  if(error||!data){
    main.innerHTML='<div class="error-state"><div class="ic">⚠️</div><div class="msg">Não foi possível carregar a equipe. Verifique sua conexão.</div></div>';
    return;
  }
  funcionarios=data;
  if(!funcionarios.length){
    main.innerHTML='<div class="empty-state"><div class="ic">👥</div><div class="msg">Nenhum funcionário cadastrado ainda.</div></div>';
    return;
  }
  const grid=document.getElementById('grid');
  grid.innerHTML=funcionarios.map((f,i)=>`
    <div class="func-card" onclick="abrirPin(${i})">
      <div class="avatar" style="background:${corPara(i)}">${f.nome[0]}</div>
      <div class="func-nome">${f.nome.split(' ')[0]}</div>
      <div class="func-cargo">${f.cargo||''}</div>
    </div>`).join('');
}
carregarFuncionarios();

function abrirPin(idx){
  funcSelecionado=funcionarios[idx];
  pinAtual='';
  document.getElementById('pinAvatar').style.background=corPara(idx);
  document.getElementById('pinAvatar').textContent=funcSelecionado.nome[0];
  document.getElementById('pinNome').textContent=funcSelecionado.nome.split(' ')[0];
  renderDots();
  document.getElementById('pinOverlay').classList.add('open');
}
function fecharPin(){
  document.getElementById('pinOverlay').classList.remove('open');
  pinAtual='';funcSelecionado=null;
}
function renderDots(){
  const dots=document.querySelectorAll('.pin-dot');
  dots.forEach((d,i)=>d.classList.toggle('filled',i<pinAtual.length));
}

document.getElementById('pinPad').addEventListener('click',function(e){
  const btn=e.target.closest('.pin-key');
  if(!btn||btn.classList.contains('ghost'))return;
  const k=btn.dataset.k;
  if(k==='del'){
    pinAtual=pinAtual.slice(0,-1);
    renderDots();
    return;
  }
  if(pinAtual.length>=4)return;
  pinAtual+=k;
  renderDots();
  if(pinAtual.length===4){
    setTimeout(confirmarPin,150);
  }
});

async function confirmarPin(){
  if(!funcSelecionado)return;
  const{data,error}=await sb.rpc('bater_ponto_kiosk',{
    p_token:TOKEN,
    p_funcionario_id:funcSelecionado.id,
    p_pin:pinAtual
  });

  if(error||!data||data.erro){
    document.getElementById('pinDots').classList.add('shake');
    setTimeout(()=>{document.getElementById('pinDots').classList.remove('shake');},400);
    pinAtual='';renderDots();
    return;
  }

  fecharPin();
  mostrarConfirmacao(data);
}

function mostrarConfirmacao(data){
  const overlay=document.getElementById('confirmOverlay');
  const isEntrada=data.tipo==='ENTRADA';
  overlay.className='confirm-overlay open '+(isEntrada?'ok':'ok');
  document.getElementById('confirmIcon').textContent=isEntrada?'👋':'✓';
  document.getElementById('confirmTitle').textContent=isEntrada?'Bom trabalho, '+data.nome.split(' ')[0]+'!':'Até logo, '+data.nome.split(' ')[0]+'!';
  document.getElementById('confirmSub').textContent=isEntrada?'Entrada registrada':'Saída registrada';
  document.getElementById('confirmHora').textContent=data.hora;

  setTimeout(()=>{
    overlay.classList.remove('open');
  },2800);
}

// Mantém a tela acordada se possível
if('wakeLock' in navigator){
  navigator.wakeLock.request('screen').catch(()=>{});
}
</script>
</body>
</html>
