<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IW · Gestão de Ponto</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Cabinet+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0a0a0c;--s1:#111114;--s2:#18181c;--s3:#222228;
  --b1:#2a2a32;--b2:#383844;
  --acc:#f0c040;--acc2:#f8d060;
  --g:#3dd68c;--r:#f87171;--o:#fb923c;--bl:#60a5fa;--pu:#c084fc;
  --gd:rgba(61,214,140,.12);--rd:rgba(248,113,113,.12);--od:rgba(251,146,60,.12);--bld:rgba(96,165,250,.12);--ad:rgba(240,192,64,.12);
  --t1:#f0f0f2;--t2:#8888a0;--t3:#44444e;
  --font:'Cabinet Grotesk',sans-serif;--mono:'DM Mono',monospace;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100vh;}
body{font-family:var(--font);background:var(--bg);color:var(--t1);font-size:14px;}

/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
.login-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r16);padding:2rem 1.75rem;width:100%;max-width:360px;}
.login-logo{font-size:11px;font-weight:800;letter-spacing:.2em;color:var(--acc);text-transform:uppercase;margin-bottom:1.5rem;}
.login-title{font-size:20px;font-weight:800;margin-bottom:.25rem;}
.login-sub{font-size:12px;color:var(--t2);margin-bottom:1.5rem;}
.field{margin-bottom:1rem;}
.field label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);display:block;margin-bottom:.4rem;}
.field input,.field select,.field textarea{
  width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r8);
  padding:11px 12px;font-family:var(--font);font-size:14px;color:var(--t1);outline:none;
}
.field input:focus,.field select:focus{border-color:var(--acc);}
.field textarea{resize:none;}
.btn{width:100%;padding:12px;background:var(--acc);border:none;border-radius:var(--r8);
  font-family:var(--font);font-size:14px;font-weight:800;color:#000;cursor:pointer;}
.btn:active{background:var(--acc2);}
.err-msg{font-size:12px;color:var(--r);text-align:center;margin-top:.75rem;min-height:18px;}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1.25rem;background:var(--s1);border-bottom:1px solid var(--b1);
  position:sticky;top:0;z-index:20;}
.tb-brand{font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--acc);text-transform:uppercase;}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-sync{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--t3);}
.sdot.ok{background:var(--g);box-shadow:0 0 8px rgba(61,214,140,.5);}
.sdot.err{background:var(--r);}
.btn-sm{padding:5px 11px;border-radius:var(--r8);font-family:var(--font);font-size:11px;
  font-weight:600;cursor:pointer;border:1px solid var(--b1);background:var(--s2);color:var(--t2);}
.btn-sm.danger{border-color:rgba(248,113,113,.3);color:var(--r);}
.btn-sm.accent{border-color:rgba(240,192,64,.3);color:var(--acc);}

/* TABS */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--b1);overflow-x:auto;padding:0 1rem;}
.tab{padding:10px 14px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
.tab:hover{color:var(--t1);}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);}

.content{flex:1;overflow-y:auto;padding:1rem 1.25rem .5rem;}

/* CARDS */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:1rem;}
.kcard{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r12);padding:.85rem 1rem;}
.klbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t2);margin-bottom:.3rem;}
.kval{font-family:var(--mono);font-size:22px;font-weight:500;line-height:1.1;}
.ksub{font-size:10px;color:var(--t3);margin-top:.2rem;}

/* TABLE */
.tcard{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r12);overflow:hidden;margin-bottom:1rem;}
.thead-row{display:flex;align-items:center;justify-content:space-between;
  padding:.65rem 1rem;border-bottom:1px solid var(--b1);}
.thead-title{font-size:12px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{padding:7px 10px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:var(--t2);border-bottom:1px solid var(--b1);}
td{padding:9px 10px;border-bottom:1px solid rgba(42,42,50,.5);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}

/* CHIPS */
.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;}
.chip.g{background:var(--gd);color:var(--g);}
.chip.r{background:var(--rd);color:var(--r);}
.chip.a{background:var(--ad);color:var(--acc);}
.chip.o{background:var(--od);color:var(--o);}
.chip.b{background:var(--bld);color:var(--bl);}

/* FUNC CARDS */
.flist{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
.fcard{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r12);padding:.9rem 1rem;}
.frow{display:flex;align-items:center;gap:10px;margin-bottom:.6rem;}
.fav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}
.fname{font-size:14px;font-weight:700;}
.fcargo{font-size:11px;color:var(--t2);}
.fstats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:.6rem;}
.fstat{background:var(--s2);border-radius:var(--r8);padding:5px 7px;}
.fstat-l{font-size:9px;color:var(--t3);}
.fstat-v{font-family:var(--mono);font-size:12px;font-weight:500;margin-top:1px;}
.factions{display:flex;gap:5px;}
.btn-xs{padding:5px 9px;font-size:11px;font-weight:600;border-radius:var(--r8);
  border:1px solid var(--b1);background:var(--s2);color:var(--t2);cursor:pointer;font-family:var(--font);}

/* BATIDAS */
.bfunc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r12);
  padding:.9rem 1rem;margin-bottom:.9rem;}
.bfunc-head{display:flex;align-items:center;gap:10px;padding-bottom:.75rem;
  margin-bottom:.75rem;border-bottom:1px solid var(--b1);}
.bfunc-info{flex:1;}
.bfunc-name{font-size:15px;font-weight:800;}
.bfunc-sub{font-size:11px;color:var(--t2);}
.bfunc-saldo{text-align:right;}
.bfunc-saldo-lbl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;}
.bfunc-saldo-val{font-family:var(--mono);font-size:20px;font-weight:600;}

.bsemana{margin-bottom:.75rem;}
.bsemana-head{display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid var(--b2);margin-bottom:4px;}
.bsemana-lbl{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:.05em;text-transform:uppercase;}
.bsemana-saldo{font-family:var(--mono);font-size:11px;font-weight:600;}

.bdia{display:flex;align-items:center;gap:6px;padding:5px 0;
  border-bottom:1px solid rgba(42,42,50,.3);}
.bdia:last-child{border-bottom:none;}
.bdia-data{font-size:11px;color:var(--t2);width:72px;flex-shrink:0;}
.bdia-batidas{flex:1;display:flex;flex-wrap:wrap;gap:3px;align-items:center;}
.bbat{font-family:var(--mono);font-size:11px;}
.bbat.ent{color:var(--g);}
.bbat.sai{color:var(--r);}
.bdia-hrs{font-family:var(--mono);font-size:11px;color:var(--t2);width:40px;text-align:right;flex-shrink:0;}
.bdia-saldo{font-family:var(--mono);font-size:11px;width:52px;text-align:right;flex-shrink:0;}

/* ADV */
.advcard{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r12);padding:.85rem 1rem;margin-bottom:8px;}

/* MODAL */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;
  align-items:flex-end;justify-content:center;}
.moverlay.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--b1);border-radius:20px 20px 0 0;
  padding:1.5rem;width:100%;max-width:480px;padding-bottom:calc(1.5rem + env(safe-area-inset-bottom));}
.mhandle{width:32px;height:3px;background:var(--b2);border-radius:2px;margin:0 auto 1.1rem;}
.mtitle{font-size:16px;font-weight:800;margin-bottom:3px;}
.msub{font-size:12px;color:var(--t2);margin-bottom:1rem;}
.mactions{display:flex;gap:7px;margin-top:.9rem;}
.mactions .btn{flex:1;padding:10px;}

.srow{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.srow h3{font-size:13px;font-weight:700;}
.empty{text-align:center;padding:2.5rem;color:var(--t3);font-size:13px;}
.loading{text-align:center;padding:2rem;color:var(--t2);font-size:13px;}
.banner{border-radius:var(--r8);padding:7px 12px;font-size:11px;font-weight:500;margin-bottom:.9rem;text-align:center;}
.banner.ok{background:var(--gd);border:1px solid rgba(61,214,140,.2);color:var(--g);}
.banner.err{background:var(--rd);border:1px solid rgba(248,113,113,.2);color:var(--r);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-wrap">
    <div class="login-logo">IW · Gestão de Ponto</div>
    <div class="login-title">Bem-vindo</div>
    <div class="login-sub">Área restrita — acesso autorizado</div>
    <div class="field"><label>Senha</label>
      <input type="password" id="lpw" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn" onclick="doLogin()">Entrar</button>
    <div class="err-msg" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-brand">IW · Ponto</div>
    <div class="tb-right">
      <div class="tb-sync"><span class="sdot" id="sdot"></span><span id="slbl">—</span></div>
      <button class="btn-sm danger" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="goTab('dash')" id="t-dash">Dashboard</div>
    <div class="tab" onclick="goTab('batidas')" id="t-batidas">Batidas</div>
    <div class="tab" onclick="goTab('banco')" id="t-banco">Banco de Horas</div>
    <div class="tab" onclick="goTab('equipe')" id="t-equipe">Equipe</div>
    <div class="tab" onclick="goTab('adv')" id="t-adv">Advertências</div>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- MODAL ADV -->
<div class="moverlay" id="m-adv">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Nova advertência</div>
    <div class="msub" id="m-adv-sub"></div>
    <div class="field"><label>Tipo</label>
      <select id="adv-tipo">
        <option>Falta injustificada</option><option>Atraso recorrente</option>
        <option>Conduta inadequada</option><option>Descumprimento de norma</option><option>Outro</option>
      </select>
    </div>
    <div class="field"><label>Descrição</label>
      <textarea id="adv-desc" rows="3" placeholder="Descreva o ocorrido..."></textarea>
    </div>
    <div class="mactions">
      <button class="btn-sm" onclick="closeModals()">Cancelar</button>
      <button class="btn" onclick="saveAdv()">Registrar</button>
    </div>
  </div>
</div>

<!-- MODAL FUNC -->
<div class="moverlay" id="m-func">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Novo funcionário</div>
    <div class="msub">Cadastro manual — para bater ponto via PIN</div>
    <div class="field"><label>Nome completo</label><input type="text" id="f-nome"></div>
    <div class="field"><label>Cargo</label><input type="text" id="f-cargo"></div>
    <div class="field"><label>PIN (4 dígitos)</label><input type="number" id="f-pin" maxlength="4"></div>
    <div class="field"><label>CPF (11 dígitos)</label><input type="text" id="f-cpf" maxlength="11" placeholder="Sem pontos ou traços"></div>
    <div class="mactions">
      <button class="btn-sm" onclick="closeModals()">Cancelar</button>
      <button class="btn" onclick="saveFunc()">Cadastrar</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const SB_URL='https://mcoemytfdrfrtbfbpvqr.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jb2VteXRmZHJmcnRiZmJwdnFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTgyODcsImV4cCI6MjA5NTM3NDI4N30.uJZKW5oUlexLo_XENDCohlchGKlG54Pwt0gvqpuy-i8';
const ADMIN_HASH='03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4'; // SHA256 de "1234"
const sb=supabase.createClient(SB_URL,SB_KEY);
const COLORS=['#f0c040','#3dd68c','#60a5fa','#f87171','#fb923c','#c084fc','#34d399'];

// ===== JORNADA =====
// Seg(1)-Qui(4): 9h líquidas = 540min | Sex(5): 8h líquidas = 480min
const JORNADA={1:540,2:540,3:540,4:540,5:480};
const ENTRADA_PADRAO='07:00';
const TOLERANCIA=5; // minutos

function jornadaDia(dataStr){
  const dow=new Date(dataStr+'T12:00:00').getDay();
  return JORNADA[dow]||0;
}
function toMin(hhmm){if(!hhmm)return 0;const[h,m]=hhmm.split(':').map(Number);return h*60+m;}
function fromMin(min){
  const neg=min<0,abs=Math.abs(min);
  const h=Math.floor(abs/60),m=abs%60;
  return (neg?'-':'')+h+'h'+(m?(m<10?'0':'')+m+'min':'');
}
function fmtData(dataStr){
  const d=new Date(dataStr+'T12:00:00');
  const dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  return dias[d.getDay()]+' '+d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}
function getSemana(dataStr){
  // Retorna segunda-feira da semana
  const d=new Date(dataStr+'T12:00:00');
  const dow=d.getDay()===0?7:d.getDay();
  const seg=new Date(d);seg.setDate(d.getDate()-(dow-1));
  return seg.toISOString().split('T')[0];
}

// Calcula minutos trabalhados num dia a partir das batidas ordenadas
// Soma pares ENTRADA->SAIDA
function calcTrabalhado(batidas){
  const sorted=[...batidas].sort((a,b)=>a.hora.localeCompare(b.hora));
  let total=0;
  for(let i=0;i<sorted.length;i++){
    if(sorted[i].tipo==='ENTRADA'&&sorted[i+1]?.tipo==='SAIDA'){
      total+=toMin(sorted[i+1].hora)-toMin(sorted[i].hora);
      i++;
    }
  }
  return total;
}

// ===== STATE =====
let funcionarios=[],advertencias=[],currentTab='dash',sbOk=false;
let loginAttempts=0,loginBlocked=false,currentAdvFunc=null;
let sessionTimer=null;

// ===== AUTH =====
async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function doLogin(){
  if(loginBlocked){document.getElementById('lerr').textContent='Bloqueado. Aguarde 1 minuto.';return;}
  const pw=document.getElementById('lpw').value;
  const hash=await sha256(pw);
  if(hash===ADMIN_HASH){
    loginAttempts=0;
    document.getElementById('lpw').value='';
    document.getElementById('lerr').textContent='';
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('app').style.flexDirection='column';
    await initApp();
    goTab('dash');
    resetSession();
  } else {
    loginAttempts++;
    if(loginAttempts>=3){
      loginBlocked=true;
      document.getElementById('lerr').textContent='3 tentativas incorretas. Bloqueado por 1 minuto.';
      setTimeout(()=>{loginBlocked=false;loginAttempts=0;document.getElementById('lerr').textContent='';},60000);
    } else {
      document.getElementById('lerr').textContent=`Senha incorreta. ${3-loginAttempts} tentativa(s) restante(s).`;
    }
  }
}
function doLogout(){
  clearTimeout(sessionTimer);
  document.getElementById('login').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('lpw').value='';
}
function resetSession(){
  clearTimeout(sessionTimer);
  sessionTimer=setTimeout(()=>{doLogout();alert('Sessão expirada.');},30*60*1000);
}
document.addEventListener('click',resetSession);

// ===== INIT =====
async function initApp(){
  try{
    const{error}=await sb.from('iw_funcionarios').select('id').limit(1);
    sbOk=!error;
    document.getElementById('sdot').className='sdot'+(sbOk?' ok':' err');
    document.getElementById('slbl').textContent=sbOk?'Online':'Offline';
    if(sbOk){await loadBase();}
  }catch(e){
    document.getElementById('sdot').className='sdot err';
    document.getElementById('slbl').textContent='Erro';
  }
}
async function loadBase(){
  const{data:f}=await sb.from('iw_funcionarios').select('*').eq('ativo',true).order('nome');
  funcionarios=(f||[]).map((x,i)=>({...x,color:COLORS[i%COLORS.length]}));
  const{data:a}=await sb.from('iw_advertencias').select('*').order('criado_em',{ascending:false});
  advertencias=a||[];
}

// ===== TABS =====
function goTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('t-'+tab)?.classList.add('on');
  const c=document.getElementById('content');
  c.innerHTML='<div class="loading">Carregando...</div>';
  c.scrollTop=0;
  if(tab==='dash') renderDash(c);
  else if(tab==='batidas') renderBatidas(c);
  else if(tab==='banco') renderBanco(c);
  else if(tab==='equipe') renderEquipe(c);
  else if(tab==='adv') renderAdv(c);
}

// ===== DASHBOARD =====
async function renderDash(c){
  const hoje=new Date().toISOString().split('T')[0];
  const dow=new Date().getDay();

  // Registros de hoje
  const{data:rh}=await sb.from('iw_registros_ponto').select('*').eq('data_local',hoje).order('id');
  const regsHoje=rh||[];

  // Monta mapa CPF -> batidas de hoje
  const mapaHoje={};
  regsHoje.forEach(r=>{
    if(!mapaHoje[r.cpf]) mapaHoje[r.cpf]=[];
    mapaHoje[r.cpf].push({hora:r.data_hora_local?.slice(11,16)||'00:00',tipo:r.tipo});
  });

  // Presentes = última batida do dia é ENTRADA
  let presentes=0;
  funcionarios.forEach(f=>{
    const bats=mapaHoje[f.cpf]||[];
    if(bats.length && bats[bats.length-1].tipo==='ENTRADA') presentes++;
  });

  // Atrasos = primeira entrada antes das 10h com atraso > tolerância
  let atrasos=0;
  funcionarios.forEach(f=>{
    const bats=(mapaHoje[f.cpf]||[]).sort((a,b)=>a.hora.localeCompare(b.hora));
    const entrada=bats.find(b=>b.tipo==='ENTRADA'&&toMin(b.hora)<=toMin('10:00'));
    if(entrada&&toMin(entrada.hora)-toMin(ENTRADA_PADRAO)>TOLERANCIA) atrasos++;
  });

  // Banco geral — soma saldo de todos os funcionários
  const{data:todos}=await sb.from('iw_registros_ponto').select('cpf,data_local,data_hora_local,tipo').gte('data_local','2026-02-01').order('id');
  const saldoGeral=calcSaldoGeral(todos||[]);

  // Faltas esta semana
  const inicioSemana=getSemana(hoje);
  const{data:rSem}=await sb.from('iw_registros_ponto').select('cpf,data_local').gte('data_local',inicioSemana).lte('data_local',hoje);
  const diasComReg=new Set((rSem||[]).map(r=>r.data_local));
  let faltas=0;
  for(let d=new Date(inicioSemana+'T12:00:00');d<=new Date(hoje+'T12:00:00');d.setDate(d.getDate()+1)){
    const ds=d.toISOString().split('T')[0];
    const dw=d.getDay();
    if(dw>=1&&dw<=5&&ds<hoje&&!diasComReg.has(ds)) faltas++;
  }

  const saldoCor=saldoGeral>=0?'var(--g)':saldoGeral<-120?'var(--r)':'var(--o)';

  c.innerHTML=`
  <div class="banner ok">● Supabase conectado · ${regsHoje.length} registros hoje</div>

function calcSaldoGeral(regs){
  // Agrupa por cpf -> data -> batidas
  const mapa={};
  regs.forEach(r=>{
    if(!mapa[r.cpf]) mapa[r.cpf]={};
    if(!mapa[r.cpf][r.data_local]) mapa[r.cpf][r.data_local]=[];
    mapa[r.cpf][r.data_local].push({hora:r.data_hora_local?.slice(11,16)||'00:00',tipo:r.tipo});
  });
  let total=0;
  // Só conta funcionários ativos
  const cpfsAtivos=new Set(funcionarios.map(f=>f.cpf));
  Object.entries(mapa).forEach(([cpf,dias])=>{
    if(!cpfsAtivos.has(cpf)) return; // ignora ex-funcionários
    Object.entries(dias).forEach(([data,bats])=>{
      const jMin=jornadaDia(data);
      if(!jMin) return;
      total+=calcTrabalhado(bats)-jMin;
    });
  });
  return total;
}

function calcRanking(todos){
  const el=document.getElementById('ranking-body');if(!el)return;
  const mesAtual=new Date().toISOString().slice(0,7);
  const mesRegs=todos.filter(r=>r.data_local?.startsWith(mesAtual));
  const cpfsAtivos=new Set(funcionarios.map(f=>f.cpf));
  const stats={};
  mesRegs.forEach(r=>{
    if(!cpfsAtivos.has(r.cpf)) return;
    if(!stats[r.cpf]) stats[r.cpf]={nome:r.funcionario_nome,atrasos:0,dias:new Set()};
    stats[r.cpf].dias.add(r.data_local);
    if(r.tipo==='ENTRADA'){
      const hora=r.data_hora_local?.slice(11,16)||'00:00';
      if(toMin(hora)<=toMin('10:00')&&toMin(hora)-toMin(ENTRADA_PADRAO)>TOLERANCIA)
        stats[r.cpf].atrasos++;
    }
  });
  const ranked=Object.entries(stats)
    .map(([cpf,s])=>({cpf,nome:s.nome,atrasos:s.atrasos,dias:s.dias.size}))
    .sort((a,b)=>a.atrasos-b.atrasos||b.dias-a.dias);
  const fmap={};funcionarios.forEach(f=>{fmap[f.cpf]=f;});
  const medals=['🥇','🥈','🥉'];
  el.innerHTML=ranked.map((r,i)=>{
    const f=fmap[r.cpf]||{color:COLORS[i%COLORS.length],nome:r.nome};
    const cor=r.atrasos===0?'var(--g)':r.atrasos<3?'var(--o)':'var(--r)';
    return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(42,42,50,.4)">
      <span style="font-size:10px;color:var(--t3);width:16px">${i+1}</span>
      <div style="width:28px;height:28px;border-radius:50%;background:${f.color}22;color:${f.color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">${r.nome[0]}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:700">${r.nome.split(' ')[0]} ${medals[i]||''}</div>
        <div style="font-size:10px;color:var(--t2)">${r.dias} dias trabalhados</div></div>
      <span style="font-family:var(--mono);font-size:12px;font-weight:600;color:${cor}">${r.atrasos===0?'Sem atrasos':r.atrasos+' atraso'+(r.atrasos>1?'s':'')}</span>
    </div>`;
  }).join('')||'<div class="empty">Sem dados</div>';
}

async function filtrarBatidas(){
  const periodo=document.getElementById('b-periodo')?.value||'mes';
  const cpfFiltro=document.getElementById('b-func')?.value||'';
  const el=document.getElementById('batidas-content');
  if(!el) return;
  el.innerHTML='<div class="loading">Carregando...</div>';

  const hoje=new Date();
  let dataIni,dataFim=hoje.toISOString().split('T')[0];

  if(periodo==='mes'){
    dataIni=hoje.toISOString().slice(0,7)+'-01';
  } else if(periodo==='mes-ant'){
    const m=new Date(hoje.getFullYear(),hoje.getMonth()-1,1);
    dataIni=m.toISOString().split('T')[0];
    const mfim=new Date(hoje.getFullYear(),hoje.getMonth(),0);
    dataFim=mfim.toISOString().split('T')[0];
  } else if(periodo==='semana'){
    dataIni=getSemana(hoje.toISOString().split('T')[0]);
  } else {
    dataIni='2026-02-01';
  }

  let q=sb.from('iw_registros_ponto').select('*').gte('data_local',dataIni).lte('data_local',dataFim).order('id');
  if(cpfFiltro) q=q.eq('cpf',cpfFiltro);
  const{data:regs}=await q;
  const todos=regs||[];

  // Agrupa por cpf -> data -> batidas
  const porCpf={};
  todos.forEach(r=>{
    if(!porCpf[r.cpf]) porCpf[r.cpf]={nome:r.funcionario_nome,dias:{}};
    if(!porCpf[r.cpf].dias[r.data_local]) porCpf[r.cpf].dias[r.data_local]=[];
    porCpf[r.cpf].dias[r.data_local].push({
      id:r.id, nsr:r.nsr, hora:r.data_hora_local?.slice(11,16)||'00:00',
      tipo:r.tipo, data_local:r.data_local, cpf:r.cpf, nome:r.funcionario_nome
    });
  });

  const cpfsAtivos=new Set(funcionarios.map(f=>f.cpf));
  const fmap={};funcionarios.forEach(f=>{fmap[f.cpf]=f;});
  let html='';

  const cpfsParaExibir=cpfFiltro?[cpfFiltro]:funcionarios.map(f=>f.cpf);

  cpfsParaExibir.forEach(cpf=>{
    const f=fmap[cpf];
    if(!f) return;
    const pf=porCpf[cpf]||{nome:f.nome,dias:{}};
    if(Object.keys(pf.dias).length===0) return;

    // Agrupa por semana
    const semanas={};
    Object.entries(pf.dias).forEach(([data,bats])=>{
      const sem=getSemana(data);
      if(!semanas[sem]) semanas[sem]=[];
      semanas[sem].push({data,bats:[...bats].sort((a,b)=>a.hora.localeCompare(b.hora))});
    });

    let saldoTotal=0;
    let semanasHtml='';

    Object.entries(semanas).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([semInicio,dias])=>{
      let saldoSem=0;
      let diasHtml='';

      dias.sort((a,b)=>a.data.localeCompare(b.data)).forEach(({data,bats})=>{
        const jMin=jornadaDia(data);
        const trabMin=calcTrabalhado(bats);
        const saldo=jMin>0?trabMin-jMin:0;
        saldoSem+=saldo;
        saldoTotal+=saldo;

        const batsHtml=bats.map(b=>`
          <span style="display:inline-flex;align-items:center;gap:2px;cursor:pointer"
            onclick="editarBatida(${b.nsr||b.id},'${b.hora}','${b.tipo}','${data}','${cpf}','${f.nome.replace(/'/g,"\'")}')"
            title="Clique para editar">
            <span class="bbat ${b.tipo==='ENTRADA'?'ent':'sai'}" style="text-decoration:underline dotted">${b.hora}</span>
            <span style="font-size:9px;color:var(--t3)">${b.tipo==='ENTRADA'?'↑':'↓'}</span>
          </span>`).join('<span style="color:var(--t3);font-size:10px;margin:0 2px">·</span>');

        const saldoCor=saldo>=0?'var(--g)':saldo<-30?'var(--r)':'var(--o)';
        diasHtml+=`<div class="bdia">
          <span class="bdia-data">${fmtData(data)}</span>
          <div class="bdia-batidas">${batsHtml}
            <span onclick="addBatida('${data}','${cpf}','${f.nome.replace(/'/g,"\'")}')"
              style="cursor:pointer;font-size:10px;color:var(--t3);margin-left:4px" title="Adicionar batida">＋</span>
          </div>
          <span class="bdia-hrs">${trabMin>0?fromMin(trabMin):'—'}</span>
          <span class="bdia-saldo" style="color:${jMin>0?saldoCor:'var(--t3)'}">${jMin>0?(saldo>=0?'+':'')+fromMin(saldo):'—'}</span>
        </div>`;
      });

      const semFmt=new Date(semInicio+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
      const semFim=new Date(semInicio+'T12:00:00');semFim.setDate(semFim.getDate()+4);
      const semFimFmt=semFim.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
      const semSaldoCor=saldoSem>=0?'var(--g)':saldoSem<-30?'var(--r)':'var(--o)';
      semanasHtml+=`<div class="bsemana">
        <div class="bsemana-head">
          <span class="bsemana-lbl">Semana ${semFmt}–${semFimFmt}</span>
          <span class="bsemana-saldo" style="color:${semSaldoCor}">${saldoSem>=0?'+':''}${fromMin(saldoSem)}</span>
        </div>${diasHtml}
      </div>`;
    });

    const saldoCor=saldoTotal>=0?'var(--g)':saldoTotal<-60?'var(--r)':'var(--o)';
    html+=`<div class="bfunc">
      <div class="bfunc-head">
        <div class="fav" style="background:${f.color}22;color:${f.color}">${f.nome[0]}</div>
        <div class="bfunc-info">
          <div class="bfunc-name">${f.nome.split(' ')[0]}</div>
          <div class="bfunc-sub">${f.cargo||'—'} · ${Object.keys(pf.dias).length} dias</div>
        </div>
        <div class="bfunc-saldo">
          <div class="bfunc-saldo-lbl">Saldo período</div>
          <div class="bfunc-saldo-val" style="color:${saldoCor}">${saldoTotal>=0?'+':''}${fromMin(saldoTotal)}</div>
        </div>
      </div>
      ${semanasHtml||'<div class="empty" style="padding:1rem">Sem registros no período</div>'}
    </div>`;
  });

  el.innerHTML=html||'<div class="empty">Nenhum registro no período selecionado</div>';
}

function editarBatida(id, horaAtual, tipoAtual, data, cpf, nome){
  const novaHora=prompt(`Editar batida de ${nome.split(' ')[0]} em ${fmtData(data)}\nHora atual: ${horaAtual} (${tipoAtual})\n\nNova hora (HH:MM):`, horaAtual);
  if(!novaHora||!/^\d{2}:\d{2}$/.test(novaHora)) return;
  const novoTipo=prompt(`Tipo (ENTRADA ou SAIDA):`,tipoAtual)?.toUpperCase();
  if(!novoTipo||!['ENTRADA','SAIDA'].includes(novoTipo)) return;
  sb.table('iw_registros_ponto').update({
    data_hora_local: data+'T'+novaHora,
    tipo: novoTipo,
    origem: 'EDITADO_MANUAL'
  }).eq('id',id).execute().then(()=>{
    filtrarBatidas();
  });
}

function addBatida(data, cpf, nome){
  const hora=prompt(`Adicionar batida para ${nome.split(' ')[0]} em ${fmtData(data)}\nHora (HH:MM):`);
  if(!hora||!/^\d{2}:\d{2}$/.test(hora)) return;
  const tipo=prompt('Tipo (ENTRADA ou SAIDA):')?.toUpperCase();
  if(!tipo||!['ENTRADA','SAIDA'].includes(tipo)) return;
  const id=Date.now();
  sb.table('iw_registros_ponto').insert({
    id, nsr:null, funcionario_id:null,
    funcionario_nome: nome, cpf,
    data_hora: new Date().toISOString(),
    data_hora_local: data+'T'+hora,
    data_local: data, tipo,
    origem:'MANUAL',
    sincronizado_em:new Date().toISOString()
  }).execute().then(()=>filtrarBatidas());
}

  const porCpf={};
  regs.forEach(r=>{
    if(!porCpf[r.cpf]) porCpf[r.cpf]={nome:r.funcionario_nome,dias:{}};
    if(!porCpf[r.cpf].dias[r.data_local]) porCpf[r.cpf].dias[r.data_local]=[];

  let html='<div class="flist">';

  funcionarios.forEach((f,fi)=>{
    const pf=porCpf[f.cpf]||{dias:{}};

      if(ent&&toMin(ent.hora)-toMin(ENTRADA_PADRAO)>TOLERANCIA) atrasos++;

    saldoGeral+=saldo;
    const sc=saldo>=0?'var(--g)':saldo<-60?'var(--r)':'var(--o)';
    html+=`<div class="fcard">
      <div class="frow">
        <div class="fav" style="background:${f.color}22;color:${f.color}">${f.nome[0]}</div>
        <div style="flex:1"><div class="fname">${f.nome.split(' ')[0]}</div><div class="fcargo">${f.cargo||'—'}</div></div>

          <div style="font-family:var(--mono);font-size:18px;font-weight:600;color:${sc}">${saldo>=0?'+':''}${fromMin(saldo)}</div>
        </div>
      </div>
      <div class="fstats">
        <div class="fstat"><div class="fstat-l">Dias trabalhados</div><div class="fstat-v">${dias}</div></div>
        <div class="fstat"><div class="fstat-l">Horas extras</div><div class="fstat-v" style="color:var(--g)">+${fromMin(extras)}</div></div>
        <div class="fstat"><div class="fstat-l">Horas devendo</div><div class="fstat-v" style="color:${devendo>0?'var(--r)':'var(--t1)'}">${devendo>0?'-'+fromMin(devendo):'0h'}</div></div>
        <div class="fstat"><div class="fstat-l">Atrasos total</div><div class="fstat-v" style="color:${atrasos>0?'var(--o)':'var(--g)'}">${atrasos}</div></div>
        <div class="fstat"><div class="fstat-l">Carga semanal</div><div class="fstat-v">44h</div></div>
        <div class="fstat"><div class="fstat-l">Jornada diária</div><div class="fstat-v">9h/8h sex</div></div>
      </div>
    </div>`;
  });

  const gc=saldoGeral>=0?'var(--g)':saldoGeral<-120?'var(--r)':'var(--o)';
  html+=`</div>
  <div class="tcard">
    <div class="thead-row">
      <span class="thead-title">Saldo total da equipe</span>
      <span style="font-family:var(--mono);font-size:16px;font-weight:700;color:${gc}">${saldoGeral>=0?'+':''}${fromMin(saldoGeral)}</span>
    </div>
    <div style="padding:.75rem 1rem;font-size:12px;color:var(--t2);line-height:1.6">
      Jornada: Seg–Qui 07:00–17:30 · Sex 07:00–16:30 · Almoço 12:00–13:30<br>
      Horas extras e débitos são acumulados no banco individual de cada funcionário.
    </div>
  </div>`;

  c.innerHTML=html;
}

      </div>
      <div style="font-size:12px;color:var(--t2);line-height:1.5">${a.descricao||'Sem descrição'}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
        <span style="font-size:11px;color:var(--t3)">${a.data_registro||''}</span>
        <button class="btn-xs" style="color:var(--r);border-color:rgba(248,113,113,.3)" onclick="delAdv(${a.id})">Remover</button>
      </div>
    </div>`;
  });
}
async function delAdv(id){
  await sb.from('iw_advertencias').delete().eq('id',id).execute();
  advertencias=advertencias.filter(a=>a.id!==id);
  renderAdv(document.getElementById('content'));
}

// ===== MODAIS =====
function openModalAdv(func){
  currentAdvFunc=func;
  document.getElementById('m-adv-sub').textContent='Funcionário: '+func.nome.split(' ')[0];
  document.getElementById('m-adv').classList.add('open');
}
function openModalFunc(){document.getElementById('m-func').classList.add('open');}
function closeModals(){document.querySelectorAll('.moverlay').forEach(m=>m.classList.remove('open'));currentAdvFunc=null;}
document.querySelectorAll('.moverlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModals();}));

async function saveAdv(){
  if(!currentAdvFunc)return;
  const adv={
    id:Date.now(),funcionario_id:currentAdvFunc.id,funcionario_nome:currentAdvFunc.nome,
    tipo:document.getElementById('adv-tipo').value,
    descricao:document.getElementById('adv-desc').value,
    data_registro:new Date().toLocaleDateString('pt-BR'),
    criado_em:new Date().toISOString()
  };
  await sb.from('iw_advertencias').upsert(adv).execute();
  advertencias.unshift(adv);
  document.getElementById('adv-desc').value='';
  closeModals();
  if(currentTab==='adv') renderAdv(document.getElementById('content'));
  else if(currentTab==='equipe') renderEquipe(document.getElementById('content'));
}

async function saveFunc(){
  const nome=document.getElementById('f-nome').value.trim();
  const cargo=document.getElementById('f-cargo').value.trim();
  const pv=document.getElementById('f-pin').value.trim();
  const cpf=document.getElementById('f-cpf').value.trim();
  if(!nome||!cargo||pv.length!==4||isNaN(parseInt(pv))){alert('Preencha nome, cargo e PIN (4 dígitos).');return;}
  if(funcionarios.find(f=>f.pin===pv)){alert('PIN já em uso.');return;}
  const func={id:Date.now(),nome,cargo,pin:pv,cpf,carga:9,ativo:true,atualizado_em:new Date().toISOString()};
  await sb.from('iw_funcionarios').upsert(func).execute();
  closeModals();
  ['f-nome','f-cargo','f-pin','f-cpf'].forEach(id=>document.getElementById(id).value='');
  await loadBase();
  renderEquipe(document.getElementById('content'));
}
</script>
