<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IW · Ponto</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Cabinet+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0a0a0c;--surface:#111114;--surface2:#18181c;--surface3:#222228;
  --border:#2a2a32;--border2:#333340;
  --accent:#f0c040;--accent2:#f8d060;--accent-dim:rgba(240,192,64,.12);
  --green:#3dd68c;--green-dim:rgba(61,214,140,.12);
  --red:#f87171;--red-dim:rgba(248,113,113,.12);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,.12);
  --orange:#fb923c;--orange-dim:rgba(251,146,60,.12);
  --text:#f0f0f2;--text2:#8888a0;--text3:#44444e;
  --font:'Cabinet Grotesk',sans-serif;--mono:'DM Mono',monospace;
  --r:12px;--r-sm:7px;--r-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100vh;overscroll-behavior:none;}
body{font-family:var(--font);background:var(--bg);color:var(--text);touch-action:manipulation;}

/* ====== TELA PONTO ====== */
#screen-ponto{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:1.25rem 1.1rem 1.5rem;}
.ponto-top{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;}
.ponto-brand{font-size:11px;font-weight:800;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;}
.sync-btn{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:var(--font);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.sync-dot.ok{background:var(--green);box-shadow:0 0 8px rgba(61,214,140,.5);}
.sync-dot.err{background:var(--red);}

.clock-section{text-align:center;margin-bottom:1.5rem;}
.clock{font-family:var(--mono);font-size:56px;font-weight:500;color:var(--text);letter-spacing:-3px;line-height:1;}
.clock-date{font-size:12px;color:var(--text2);margin-top:5px;letter-spacing:.04em;}

.status-chips{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem;width:100%;}
.s-chip{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;background:var(--surface);border:1px solid var(--border);font-size:11px;font-weight:600;}
.s-dot{width:6px;height:6px;border-radius:50%;}
.s-dot.in{background:var(--green);box-shadow:0 0 6px rgba(61,214,140,.6);}
.s-dot.out{background:var(--text3);}

.pin-card{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.1rem .9rem;margin-bottom:.6rem;}
.pin-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text2);text-transform:uppercase;text-align:center;margin-bottom:.9rem;}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:1.1rem;}
.pdot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border2);transition:all .15s;}
.pdot.on{background:var(--accent);border-color:var(--accent);box-shadow:0 0 10px rgba(240,192,64,.5);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.nb{height:58px;border-radius:var(--r-sm);background:var(--surface2);border:1px solid var(--border);font-family:var(--mono);font-size:20px;font-weight:500;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;user-select:none;}
.nb:active{background:var(--surface3);border-color:var(--accent);color:var(--accent);transform:scale(.93);}
.nb.del{font-size:16px;color:var(--text2);}
.nb.ok{background:var(--accent);border-color:var(--accent);color:#000;font-family:var(--font);font-size:14px;font-weight:800;}
.nb.ok:active{background:var(--accent2);}

.fb{width:100%;padding:10px;border-radius:var(--r-sm);font-size:13px;text-align:center;opacity:0;transition:opacity .2s;min-height:40px;display:flex;align-items:center;justify-content:center;font-weight:500;}
.fb.ok{opacity:1;background:var(--green-dim);border:1px solid rgba(61,214,140,.25);color:var(--green);}
.fb.err{opacity:1;background:var(--red-dim);border:1px solid rgba(248,113,113,.25);color:var(--red);}

/* ====== ADMIN LOGIN ====== */
#screen-login{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.75rem 1.5rem;width:100%;max-width:340px;}
.login-title{font-size:18px;font-weight:800;margin-bottom:3px;}
.login-sub{font-size:12px;color:var(--text2);margin-bottom:1.4rem;}
.field label{font-size:10px;color:var(--text2);font-weight:700;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 12px;font-family:var(--font);font-size:15px;color:var(--text);outline:none;margin-bottom:1rem;}
.field input:focus{border-color:var(--accent);}
.field textarea{resize:none;}
.btn-cta{width:100%;padding:12px;background:var(--accent);border:none;border-radius:var(--r-sm);font-family:var(--font);font-size:15px;font-weight:800;color:#000;cursor:pointer;}
.btn-cta:active{background:var(--accent2);}
.btn-ghost{width:100%;margin-top:10px;font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:var(--font);padding:8px;text-align:center;}
.login-err{font-size:12px;color:var(--red);text-align:center;margin-top:8px;min-height:18px;}

/* ====== ADMIN ====== */
#screen-admin{display:none;flex-direction:column;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.1rem;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;}
.tb-left{display:flex;align-items:center;gap:8px;}
.tb-logo{font-size:10px;font-weight:800;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;}
.tb-sep{color:var(--border2);}
.tb-title{font-size:13px;font-weight:700;color:var(--text);}
.btn-sm{padding:5px 11px;border-radius:var(--r-sm);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);}
.btn-sm.danger{border-color:rgba(248,113,113,.3);color:var(--red);}
.btn-sm.accent{border-color:rgba(240,192,64,.3);color:var(--accent);}

.content{flex:1;overflow-y:auto;padding:.9rem 1rem .5rem;}

/* bottom nav */
.bnav{display:flex;position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border);z-index:10;}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 6px;gap:3px;cursor:pointer;border:none;background:none;font-family:var(--font);}
.bni svg{width:20px;height:20px;stroke:var(--text3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s;}
.bni span{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.04em;white-space:nowrap;transition:color .15s;}
.bni.active svg{stroke:var(--accent);}
.bni.active span{color:var(--accent);}

/* cards */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.9rem;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.8rem;}
.kpi-lbl{font-size:10px;color:var(--text2);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;}
.kpi-val{font-family:var(--mono);font-size:24px;font-weight:500;line-height:1;}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:3px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:.9rem;}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:.7rem .9rem;border-bottom:1px solid var(--border);}
.card-title{font-size:13px;font-weight:700;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:7px 8px;text-align:left;font-size:10px;color:var(--text2);font-weight:600;letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--border);}
td{padding:8px 8px;border-bottom:1px solid rgba(42,42,50,.6);color:var(--text);vertical-align:middle;}
tr:last-child td{border-bottom:none;}

.chip{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;}
.chip-green{background:var(--green-dim);color:var(--green);}
.chip-red{background:var(--red-dim);color:var(--red);}
.chip-amber{background:var(--accent-dim);color:var(--accent);}
.chip-orange{background:var(--orange-dim);color:var(--orange);}
.chip-blue{background:var(--blue-dim);color:var(--blue);}

.func-list{display:flex;flex-direction:column;gap:8px;margin-bottom:.9rem;}
.fc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.85rem;}
.fc-row{display:flex;align-items:center;gap:9px;margin-bottom:8px;}
.fc-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}
.fc-name{font-size:14px;font-weight:700;}
.fc-cargo{font-size:11px;color:var(--text2);}
.fc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:7px;}
.fc-stat{background:var(--surface2);border-radius:var(--r-sm);padding:5px 7px;}
.fc-stat-lbl{font-size:9px;color:var(--text3);}
.fc-stat-val{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text);margin-top:1px;}
.fc-actions{display:flex;gap:5px;}
.btn-xs{padding:5px 9px;font-size:11px;font-weight:600;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:var(--font);}

.adv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.85rem;margin-bottom:7px;}
.section-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.section-row h3{font-size:13px;font-weight:700;}
.empty{text-align:center;padding:2rem;color:var(--text3);font-size:13px;}
.loading{text-align:center;padding:2rem;color:var(--text2);font-size:13px;}
.banner{border-radius:var(--r-sm);padding:7px 11px;font-size:11px;font-weight:500;margin-bottom:.9rem;text-align:center;}
.banner.ok{background:var(--green-dim);border:1px solid rgba(61,214,140,.2);color:var(--green);}
.banner.err{background:var(--red-dim);border:1px solid rgba(248,113,113,.2);color:var(--red);}

/* ranking */
.rank-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(42,42,50,.5);}
.rank-item:last-child{border-bottom:none;}
.rank-num{font-family:var(--mono);font-size:11px;color:var(--text3);width:16px;flex-shrink:0;}
.rank-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.rank-info{flex:1;}
.rank-name{font-size:13px;font-weight:600;}
.rank-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.rank-badge{font-family:var(--mono);font-size:12px;font-weight:500;}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:1.5rem;width:100%;max-width:480px;padding-bottom:calc(1.5rem + env(safe-area-inset-bottom));}
.mhandle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 1.2rem;}
.modal-title{font-size:16px;font-weight:800;margin-bottom:3px;}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:1.1rem;}
.modal-actions{display:flex;gap:7px;margin-top:.9rem;}
.modal-actions .btn-cta{flex:1;padding:10px;}
</style>
</head>
<body>

<!-- PONTO -->
<div id="screen-ponto">
  <div class="ponto-top">
    <div class="ponto-brand">IW · Ponto</div>
    <button class="sync-btn" onclick="showLogin()">
      <span class="sync-dot" id="sdot"></span>Gerencial
    </button>
  </div>
  <div class="clock-section">
    <div class="clock" id="clock">00:00:00</div>
    <div class="clock-date" id="cdate"></div>
  </div>
  <div class="status-chips" id="chips"></div>
  <div class="pin-card">
    <div class="pin-lbl">Digite seu PIN</div>
    <div class="pin-dots">
      <div class="pdot" id="p0"></div><div class="pdot" id="p1"></div>
      <div class="pdot" id="p2"></div><div class="pdot" id="p3"></div>
    </div>
    <div class="numpad">
      <button class="nb" onclick="pp('1')">1</button><button class="nb" onclick="pp('2')">2</button><button class="nb" onclick="pp('3')">3</button>
      <button class="nb" onclick="pp('4')">4</button><button class="nb" onclick="pp('5')">5</button><button class="nb" onclick="pp('6')">6</button>
      <button class="nb" onclick="pp('7')">7</button><button class="nb" onclick="pp('8')">8</button><button class="nb" onclick="pp('9')">9</button>
      <button class="nb del" onclick="pd()">⌫</button><button class="nb" onclick="pp('0')">0</button><button class="nb ok" onclick="pc()">OK</button>
    </div>
  </div>
  <div class="fb" id="fb"></div>
</div>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-title">Acesso gerencial</div>
    <div class="login-sub">Área restrita · IW Gestão de Ponto</div>
    <div class="field"><label>Senha</label><input type="password" id="lpw" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-cta" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="lerr"></div>
    <button class="btn-ghost" onclick="showPonto()">← Voltar</button>
  </div>
</div>

<!-- ADMIN -->
<div id="screen-admin">
  <div class="topbar">
    <div class="tb-left">
      <span class="tb-logo">IW</span>
      <span class="tb-sep">|</span>
      <span class="tb-title" id="ttitle">Dashboard</span>
    </div>
    <button class="btn-sm danger" onclick="showPonto()">Sair</button>
  </div>
  <div class="content" id="tcontent"></div>
  <div class="bnav">
    <button class="bni active" onclick="goTab('dash')" id="bni-dash">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Dashboard</span>
    </button>
    <button class="bni" onclick="goTab('hoje')" id="bni-hoje">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
      <span>Hoje</span>
    </button>
    <button class="bni" onclick="goTab('banco')" id="bni-banco">
      <svg viewBox="0 0 24 24"><line x1="12" y1="20" x2="12" y2="4"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
      <span>Banco Hrs</span>
    </button>
    <button class="bni" onclick="goTab('equipe')" id="bni-equipe">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="19" cy="8" r="3"/><path d="M22 21v-1a3 3 0 0 0-3-3h-1"/></svg>
      <span>Equipe</span>
    </button>
    <button class="bni" onclick="goTab('adv')" id="bni-adv">
      <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>Advertências</span>
    </button>
  </div>
</div>

<!-- MODAL ADV -->
<div class="modal-overlay" id="madv">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="modal-title">Nova advertência</div>
    <div class="modal-sub" id="madv-sub"></div>
    <div class="field"><label>Tipo</label>
      <select id="adv-tipo"><option>Falta injustificada</option><option>Atraso recorrente</option><option>Conduta inadequada</option><option>Descumprimento de norma</option><option>Outro</option></select>
    </div>
    <div class="field"><label>Descrição</label><textarea id="adv-desc" rows="3" placeholder="Descreva o ocorrido..."></textarea></div>
    <div class="modal-actions"><button class="btn-sm" onclick="closeModal()">Cancelar</button><button class="btn-cta" onclick="saveAdv()">Registrar</button></div>
  </div>
</div>

<!-- MODAL NOVO FUNC -->
<div class="modal-overlay" id="mfunc">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="modal-title">Novo funcionário</div>
    <div class="modal-sub">Cadastre para bater ponto via PIN</div>
    <div class="field"><label>Nome completo</label><input type="text" id="f-nome" placeholder="Ex: João Silva"></div>
    <div class="field"><label>Cargo</label><input type="text" id="f-cargo" placeholder="Ex: Operador"></div>
    <div class="field"><label>PIN (4 dígitos)</label><input type="number" id="f-pin" maxlength="4" placeholder="1234"></div>
    <div class="field"><label>Carga horária</label>
      <select id="f-carga"><option value="8">8h/dia (padrão)</option><option value="7.5">7h30/dia</option><option value="6">6h/dia</option></select>
    </div>
    <div class="modal-actions"><button class="btn-sm" onclick="closeModal()">Cancelar</button><button class="btn-cta" onclick="saveFunc()">Cadastrar</button></div>
  </div>
</div>

<script>
// ======= CONFIG =======
const SB_URL = 'https://mcoemytfdrfrtbfbpvqr.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jb2VteXRmZHJmcnRiZmJwdnFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTgyODcsImV4cCI6MjA5NTM3NDI4N30.uJZKW5oUlexLo_XENDCohlchGKlG54Pwt0gvqpuy-i8';
const sb = supabase.createClient(SB_URL, SB_KEY);

// Senha com hash SHA-256 de "1234" — troque pela hash da sua senha real
const ADMIN_HASH = '03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4';

const COLORS = ['#f0c040','#3dd68c','#60a5fa','#f87171','#fb923c','#c084fc','#34d399'];

// Jornada IW
const JORNADA = {
  // min = minutos LÍQUIDOS esperados (descontando 1h30 almoço)
  // Seg-Qui: 7h-17h30 = 10h30 total - 1h30 almoço = 9h = 540min
  // Sex: 7h-16h30 = 9h30 total - 1h30 almoço = 8h = 480min
  1:{entrada:'07:00',saida:'17:30',min:540}, // seg
  2:{entrada:'07:00',saida:'17:30',min:540}, // ter
  3:{entrada:'07:00',saida:'17:30',min:540}, // qua
  4:{entrada:'07:00',saida:'17:30',min:540}, // qui
  5:{entrada:'07:00',saida:'16:30',min:480}, // sex
};
const ALMOCO_INICIO = '12:00';
const ALMOCO_FIM = '13:30';

let sbOk=false, pin='', currentAdvFunc=null, currentTab='dash';
let funcionarios=[], advertencias=[];
let loginAttempts=0, loginBlocked=false;

// ======= INIT =======
async function init() {
  try {
    const {error} = await sb.from('iw_funcionarios').select('id').limit(1);
    sbOk = !error;
    document.getElementById('sdot').className = 'sync-dot ' + (sbOk?'ok':'err');
    if(sbOk) await carregarBase();
  } catch(e) {
    document.getElementById('sdot').className = 'sync-dot err';
  }
}

async function carregarBase() {
  const {data:f} = await sb.from('iw_funcionarios').select('*').eq('ativo',true).order('nome');
  if(f) funcionarios = f.map((x,i)=>({...x,color:COLORS[i%COLORS.length]}));
  const {data:a} = await sb.from('iw_advertencias').select('*').order('criado_em',{ascending:false});
  if(a) advertencias = a;
  updateChips();
}

// ======= CLOCK =======
function tick() {
  const n=new Date(), pad=x=>String(x).padStart(2,'0');
  const el=document.getElementById('clock');
  if(el) el.textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
  const days=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

// ======= AUTH =======
async function sha256(msg) {
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

  const pw=document.getElementById('lpw').value;

// ======= HELPERS JORNADA =======
function toMin(hhmm) {
  const [h,m]=hhmm.split(':').map(Number); return h*60+m;
}
function fromMin(min) {
  const h=Math.floor(Math.abs(min)/60), m=Math.abs(min)%60;
  return `${min<0?'-':''}${h}h${m?m+'min':''}`;
}
function jornadaDia(dow) {
  return JORNADA[dow] || null;
}
function calcSaldoDia(batidas, dow) {
  // batidas: [{hora, tipo}] ordenadas
  const j = jornadaDia(dow);
  if(!j || !batidas.length) return 0;
  // calcula minutos trabalhados (soma pares entrada/saída, desconta almoço)
  let trabalhado = 0;
  for(let i=0;i<batidas.length-1;i+=2) {
    if(batidas[i].tipo==='ENTRADA' && batidas[i+1]?.tipo==='SAIDA') {
      trabalhado += toMin(batidas[i+1].hora) - toMin(batidas[i].hora);
    }
  }
  // desconta almoço (30min contratual, sistema registra mas não desconta aqui pois já registra saída/volta)
  return trabalhado - j.min;
}
function atrasoEntrada(hora, dow) {
  const j=jornadaDia(dow); if(!j) return 0;
  return Math.max(0, toMin(hora) - toMin(j.entrada));
}
function statusEntrada(hora, dow) {
  const at=atrasoEntrada(hora,dow);
  if(at===0) return {label:'Pontual',cls:'chip-green'};
  if(at<=5) return {label:`+${at}min`,cls:'chip-amber'};
  return {label:`Atraso ${at}min`,cls:'chip-red'};
}

async function renderDash(c) {
  const hoje=new Date();
  const dow=hoje.getDay();
  const hojeStr=hoje.toISOString().split('T')[0];
  const {data:regsH}=await sb.from('iw_registros_ponto').select('*').eq('data_local',hojeStr).order('id');
  const regs=regsH||[];

  // presentes agora — indexa por CPF
  const statusMap={};
  regs.forEach(r=>{
    const key=r.cpf||r.funcionario_nome;
    if(!statusMap[key]) statusMap[key]=[];
    statusMap[key].push(r);
  });
  let presentes=0;
  Object.values(statusMap).forEach(rs=>{if(rs[rs.length-1]?.tipo==='ENTRADA')presentes++;});

  // saldo geral banco
  const {data:todos}=await sb.from('iw_registros_ponto').select('*').gte('data_local','2026-01-01').order('id');
  let saldoTotal=0;
  const saldoPorFunc={};
  (todos||[]).forEach(r=>{
    if(!saldoPorFunc[r.cpf]) saldoPorFunc[r.cpf]={batidas:{},nome:r.funcionario_nome};
    if(!saldoPorFunc[r.cpf].batidas[r.data_local]) saldoPorFunc[r.cpf].batidas[r.data_local]=[];
    saldoPorFunc[r.cpf].batidas[r.data_local].push({hora:r.data_hora_local?.slice(11,16)||'00:00',tipo:r.tipo});
  });
  Object.values(saldoPorFunc).forEach(f=>{
    Object.entries(f.batidas).forEach(([data,bts])=>{
      const d=new Date(data+'T12:00:00'); const dw=d.getDay();
      saldoTotal+=calcSaldoDia(bts.sort((a,b)=>a.hora.localeCompare(b.hora)),dw);
    });
  });

  // faltas esta semana
  const inicioSemana=new Date(hoje); inicioSemana.setDate(hoje.getDate()-dow+1);
  let faltasSemana=0;
  for(let d=new Date(inicioSemana);d<hoje;d.setDate(d.getDate()+1)){
    if(d.getDay()===0||d.getDay()===6) continue;
    const ds=d.toISOString().split('T')[0];
    const temReg=(todos||[]).some(r=>r.data_local===ds);
    if(!temReg) faltasSemana++;
  }

  // atrasos hoje
  let atrasosHoje=0;
  Object.entries(statusMap).forEach(([cpf,rs])=>{
    const entrada=rs.find(r=>r.tipo==='ENTRADA');
    if(entrada){
      const hora=entrada.data_hora_local?.slice(11,16)||'00:00';
      if(atrasoEntrada(hora,dow)>5) atrasosHoje++;
    }
  });

  const saldoStr=(saldoTotal>=0?'+':'')+fromMin(saldoTotal);
  const saldoColor=saldoTotal>=0?'var(--green)':saldoTotal<-60?'var(--red)':'var(--accent)';

  c.innerHTML=`
    <div class="banner ok">● Supabase conectado · ${regs.length} registros hoje</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-lbl">Presentes</div><div class="kpi-val" style="color:var(--green)">${presentes}</div><div class="kpi-sub">de ${funcionarios.length} funcionários</div></div>
      <div class="kpi"><div class="kpi-lbl">Atrasos hoje</div><div class="kpi-val" style="color:${atrasosHoje>0?'var(--orange)':'var(--green)'}">${atrasosHoje}</div><div class="kpi-sub">acima de 5 min</div></div>
      <div class="kpi"><div class="kpi-lbl">Banco geral</div><div class="kpi-val" style="font-size:18px;color:${saldoColor}">${saldoStr}</div><div class="kpi-sub">equipe toda</div></div>
      <div class="kpi"><div class="kpi-lbl">Faltas semana</div><div class="kpi-val" style="color:${faltasSemana>0?'var(--red)':'var(--green)'}">${faltasSemana}</div><div class="kpi-sub">dias sem registro</div></div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Hoje — status em tempo real</span></div>
      <table><thead><tr><th>Funcionário</th><th>Entrada</th><th>Status</th><th>Situação</th></tr></thead><tbody>
      ${funcionarios.map(f=>{
        const rs=statusMap[f.cpf||f.nome]||statusMap[f.nome.split(' ')[0]]||[];
        const entrada=rs.find(r=>r.tipo==='ENTRADA');
        const ultimo=rs[rs.length-1];
        const dentro=ultimo?.tipo==='ENTRADA';
        const hora=entrada?.data_hora_local?.slice(11,16)||'—';
        const st=entrada?statusEntrada(hora,dow):{label:'Ausente',cls:'chip-red'};
        const sit=dentro?'<span class="chip chip-green">No trabalho</span>':entrada?'<span class="chip chip-amber">Saiu</span>':'<span class="chip chip-red">Ausente</span>';
        return `<tr><td style="font-weight:600">${f.nome.split(' ')[0]}</td><td style="font-family:var(--mono)">${hora}</td><td><span class="chip ${st.cls}">${st.label}</span></td><td>${sit}</td></tr>`;
      }).join('')}
      </tbody></table>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Ranking pontualidade — mês</span></div>
      <div style="padding:.5rem .7rem" id="ranking-list">Calculando...</div>
    </div>`;

  // ranking async
  calcRanking(todos||[]);
}

function calcRanking(todos) {
  const el=document.getElementById('ranking-list'); if(!el) return;
  const mesAtual=new Date().toISOString().slice(0,7);
  const mesRegs=todos.filter(r=>r.data_local?.startsWith(mesAtual));
  const stats={};
  mesRegs.forEach(r=>{
    if(!stats[r.cpf]) stats[r.cpf]={nome:r.funcionario_nome,atrasos:0,dias:new Set()};
    stats[r.cpf].dias.add(r.data_local);
    if(r.tipo==='ENTRADA'){
      const hora=r.data_hora_local?.slice(11,16)||'00:00';
      const dow=new Date(r.data_local+'T12:00:00').getDay();
      if(atrasoEntrada(hora,dow)>5) stats[r.cpf].atrasos++;
    }
  });
  const ranked=Object.entries(stats)
    .map(([cpf,s])=>({cpf,nome:s.nome,atrasos:s.atrasos,dias:s.dias.size}))
    .sort((a,b)=>a.atrasos-b.atrasos);
  const f_map={};
  funcionarios.forEach(f=>{f_map[f.cpf]=f;});
  el.innerHTML=ranked.map((r,i)=>{
    const f=f_map[r.cpf]||{color:COLORS[i%COLORS.length],nome:r.nome};
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    return `<div class="rank-item">
      <span class="rank-num">${i+1}</span>
      <div class="rank-av" style="background:${f.color}22;color:${f.color}">${r.nome[0]}</div>
      <div class="rank-info"><div class="rank-name">${r.nome.split(' ')[0]} ${medal}</div><div style="font-size:11px;color:var(--text2)">${r.dias} dias trabalhados</div></div>
      <span class="rank-badge" style="color:${r.atrasos===0?'var(--green)':r.atrasos<3?'var(--accent)':'var(--red)'}">${r.atrasos===0?'Sem atrasos':r.atrasos+' atraso'+( r.atrasos>1?'s':'')}</span>
    </div>`;
  }).join('') || '<div class="empty">Sem dados este mês</div>';
}

function openModalFunc(){document.getElementById('mfunc').classList.add('open');}
function closeModal(){document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open'));currentAdvFunc=null;}
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModal();}));

async function saveAdv(){
  if(!currentAdvFunc) return;
  const adv={id:Date.now(),funcionario_id:currentAdvFunc.id,funcionario_nome:currentAdvFunc.nome,tipo:document.getElementById('adv-tipo').value,descricao:document.getElementById('adv-desc').value,data_registro:new Date().toLocaleDateString('pt-BR'),criado_em:new Date().toISOString()};
  await sb.from('iw_advertencias').upsert(adv).execute();
  advertencias.unshift(adv);
  document.getElementById('adv-desc').value='';
  closeModal();
  if(currentTab==='adv') renderAdv(document.getElementById('tcontent'));
  else if(currentTab==='equipe') renderEquipe(document.getElementById('tcontent'));
}

async function saveFunc(){
  const nome=document.getElementById('f-nome').value.trim();
  const cargo=document.getElementById('f-cargo').value.trim();
  const pv=document.getElementById('f-pin').value.trim();
  const carga=parseFloat(document.getElementById('f-carga').value);
  if(!nome||!cargo||pv.length!==4||isNaN(parseInt(pv))){alert('Preencha todos os campos.');return;}
  if(funcionarios.find(f=>f.pin===pv)){alert('PIN já em uso.');return;}
  const func={id:Date.now(),nome,cargo,pin:pv,carga,ativo:true,atualizado_em:new Date().toISOString()};
  await sb.from('iw_funcionarios').upsert(func).execute();
  ['f-nome','f-cargo','f-pin'].forEach(id=>document.getElementById(id).value='');
  closeModal();
  await carregarBase();
  renderEquipe(document.getElementById('tcontent'));
}

// timeout de sessão 30min
let sessionTimer;
function resetTimer(){
  clearTimeout(sessionTimer);
  sessionTimer=setTimeout(()=>{
    if(document.getElementById('screen-admin').style.display!=='none'){
      showPonto(); alert('Sessão expirada por inatividade.');
    }
  },30*60*1000);
}
document.addEventListener('touchstart',resetTimer);
document.addEventListener('click',resetTimer);

init();
</script>
