<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IW · Controle de Ponto</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f0f11;--surface:#17171a;--surface2:#1e1e22;--surface3:#27272c;--border:#2e2e35;--accent:#e8c547;--accent2:#f0d060;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--orange:#fb923c;--text:#f0f0f2;--text2:#9090a0;--text3:#50505a;--font:'Sora',sans-serif;--mono:'DM Mono',monospace;--r:14px;--r-sm:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100vh;overscroll-behavior:none;}
body{font-family:var(--font);background:var(--bg);color:var(--text);touch-action:manipulation;}
#screen-ponto{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:1.5rem 1.25rem 1.75rem;}
.ponto-top{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.ponto-brand{font-size:10px;font-weight:700;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);display:inline-block;margin-right:5px;transition:all .3s;}
.sync-dot.ok{background:var(--green);box-shadow:0 0 6px rgba(74,222,128,.5);}
.sync-dot.err{background:var(--red);}
.btn-admin-link{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:var(--font);padding:4px 0;display:flex;align-items:center;gap:4px;}
.ponto-info{text-align:center;margin-bottom:1.75rem;}
.ponto-clock{font-family:var(--mono);font-size:52px;font-weight:400;color:var(--text);letter-spacing:-2px;line-height:1;}
.ponto-date{font-size:13px;color:var(--text2);margin-top:5px;}
.status-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:1.75rem;width:100%;}
.status-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;background:var(--surface);border:1px solid var(--border);font-size:12px;font-weight:500;}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.status-dot.in{background:var(--green);box-shadow:0 0 6px rgba(74,222,128,.5);}
.status-dot.out{background:var(--text3);}
.pin-box{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1rem;margin-bottom:.75rem;}
.pin-label{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--text2);text-transform:uppercase;text-align:center;margin-bottom:1rem;}
.pin-display{display:flex;gap:14px;justify-content:center;margin-bottom:1.25rem;}
.pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--border);transition:all .18s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 12px rgba(232,197,71,.4);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.num-btn{height:62px;border-radius:var(--r-sm);background:var(--surface2);border:1px solid var(--border);font-family:var(--mono);font-size:22px;font-weight:500;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;user-select:none;}
.num-btn:active{background:var(--surface3);border-color:var(--accent);color:var(--accent);transform:scale(.94);}
.num-btn.del{font-size:18px;color:var(--text2);}
.num-btn.ok{background:var(--accent);border-color:var(--accent);color:#000;font-family:var(--font);font-size:15px;font-weight:700;}
.num-btn.ok:active{background:var(--accent2);}
.ponto-feedback{width:100%;padding:11px 14px;border-radius:var(--r-sm);font-size:13px;text-align:center;line-height:1.4;opacity:0;transition:opacity .2s;min-height:44px;display:flex;align-items:center;justify-content:center;}
.ponto-feedback.show-success{opacity:1;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);color:var(--green);}
.ponto-feedback.show-error{opacity:1;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--red);}
#screen-adminlogin{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
.admin-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem 1.5rem;width:100%;max-width:360px;}
.admin-title{font-size:16px;font-weight:600;margin-bottom:4px;}
.admin-sub{font-size:12px;color:var(--text2);margin-bottom:1.5rem;}
.field{margin-bottom:1rem;}
.field label{font-size:11px;color:var(--text2);font-weight:500;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;font-family:var(--font);font-size:15px;color:var(--text);outline:none;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field textarea{resize:none;}
.btn-primary{width:100%;padding:13px;background:var(--accent);border:none;border-radius:var(--r-sm);font-family:var(--font);font-size:15px;font-weight:600;color:#000;cursor:pointer;}
.btn-primary:active{background:var(--accent2);}
.btn-back{margin-top:12px;font-size:13px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:var(--font);width:100%;text-align:center;padding:8px;}
#screen-admin{display:none;flex-direction:column;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.1rem;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;}
.topbar-logo{font-size:11px;font-weight:700;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;}
.btn-sm{padding:6px 12px;border-radius:var(--r-sm);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);}
.btn-sm.danger{border-color:rgba(248,113,113,.3);color:var(--red);}
.btn-sm.accent{border-color:rgba(232,197,71,.3);color:var(--accent);}
.bottom-nav{display:flex;position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border);z-index:10;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;gap:3px;cursor:pointer;border:none;background:none;font-family:var(--font);}
.nav-icon{font-size:18px;}
.nav-label{font-size:9px;font-weight:500;color:var(--text3);letter-spacing:.04em;white-space:nowrap;}
.nav-item.active .nav-label{color:var(--accent);}
.content{flex:1;overflow-y:auto;padding:1rem 1rem .5rem;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.85rem;}
.kpi-label{font-size:10px;color:var(--text2);font-weight:500;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;}
.kpi-val{font-family:var(--mono);font-size:26px;font-weight:500;color:var(--text);line-height:1;}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1rem;}
.table-head{display:flex;align-items:center;justify-content:space-between;padding:.75rem .9rem;border-bottom:1px solid var(--border);}
.table-head-title{font-size:13px;font-weight:600;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:8px;text-align:left;font-size:10px;color:var(--text2);font-weight:500;letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--border);}
td{padding:9px 8px;border-bottom:1px solid rgba(46,46,53,.5);color:var(--text);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.chip{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;}
.chip-green{background:rgba(74,222,128,.12);color:var(--green);}
.chip-amber{background:rgba(232,197,71,.12);color:var(--accent);}
.chip-orange{background:rgba(251,146,60,.12);color:var(--orange);}
.chip-blue{background:rgba(96,165,250,.12);color:var(--blue);}
.func-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
.func-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;}
.func-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.func-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0;}
.func-name{font-size:14px;font-weight:600;}
.func-cargo{font-size:11px;color:var(--text2);}
.func-stats{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px;}
.func-stat{background:var(--surface2);border-radius:var(--r-sm);padding:5px 7px;}
.func-stat-label{font-size:9px;color:var(--text3);}
.func-stat-val{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text);margin-top:1px;}
.func-actions{display:flex;gap:6px;}
.btn-xs{padding:6px 10px;font-size:11px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:var(--font);}
.adv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;margin-bottom:8px;}
.adv-name{font-size:13px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.adv-desc{font-size:12px;color:var(--text2);line-height:1.5;}
.adv-date{font-size:11px;color:var(--text3);margin-top:4px;}
.section-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.section-row h3{font-size:13px;font-weight:600;}
.empty-state{text-align:center;padding:2rem;color:var(--text3);font-size:13px;}
.loading-state{text-align:center;padding:2rem;color:var(--text2);font-size:13px;}
.info-banner{border-radius:var(--r-sm);padding:8px 12px;font-size:11px;margin-bottom:1rem;text-align:center;}
.info-banner.ok{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:var(--green);}
.info-banner.warn{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--red);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:1.5rem;width:100%;max-width:480px;padding-bottom:calc(1.5rem + env(safe-area-inset-bottom));}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.25rem;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:1.2rem;}
.modal-actions{display:flex;gap:8px;margin-top:1rem;}
.modal-actions .btn-primary{flex:1;}
.pin-info{font-size:11px;color:var(--text3);margin-top:4px;}
</style>
</head>
<body>

<div id="screen-ponto">
  <div class="ponto-top">
    <div class="ponto-brand">IW · Ponto</div>
    <button class="btn-admin-link" onclick="showAdminLogin()">
      <span class="sync-dot" id="sync-dot"></span>⚙ Gerencial
    </button>
  </div>
  <div class="ponto-info">
    <div class="ponto-clock" id="clock">00:00:00</div>
    <div class="ponto-date" id="datedisp"></div>
  </div>
  <div class="status-row" id="status-row"></div>
  <div class="pin-box">
    <div class="pin-label">Digite seu PIN</div>
    <div class="pin-display">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="pinPress('1')">1</button>
      <button class="num-btn" onclick="pinPress('2')">2</button>
      <button class="num-btn" onclick="pinPress('3')">3</button>
      <button class="num-btn" onclick="pinPress('4')">4</button>
      <button class="num-btn" onclick="pinPress('5')">5</button>
      <button class="num-btn" onclick="pinPress('6')">6</button>
      <button class="num-btn" onclick="pinPress('7')">7</button>
      <button class="num-btn" onclick="pinPress('8')">8</button>
      <button class="num-btn" onclick="pinPress('9')">9</button>
      <button class="num-btn del" onclick="pinDel()">⌫</button>
      <button class="num-btn" onclick="pinPress('0')">0</button>
      <button class="num-btn ok" onclick="pinConfirm()">OK</button>
    </div>
  </div>
  <div class="ponto-feedback" id="feedback"></div>
</div>

<div id="screen-adminlogin">
  <div class="admin-box">
    <div class="admin-title">Acesso gerencial</div>
    <div class="admin-sub">Senha de administrador</div>
    <div class="field"><label>Senha</label><input type="password" id="admin-pw" placeholder="••••••" onkeydown="if(event.key==='Enter')adminLogin()"></div>
    <button class="btn-primary" onclick="adminLogin()">Entrar</button>
    <button class="btn-back" onclick="showPonto()">← Voltar</button>
  </div>
</div>

<div id="screen-admin">
  <div class="topbar">
    <div><span class="topbar-logo">IW</span><span style="color:var(--border);margin:0 6px">|</span><span style="font-size:13px;font-weight:500" id="tab-title">Dashboard</span></div>
    <button class="btn-sm danger" onclick="showPonto()">Sair</button>
  </div>
  <div class="content" id="tab-content"></div>
  <div class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('dashboard')" id="nav-dashboard"><span class="nav-icon">📊</span><span class="nav-label">Dashboard</span></button>
    <button class="nav-item" onclick="switchTab('registros')" id="nav-registros"><span class="nav-icon">🕐</span><span class="nav-label">Registros</span></button>
    <button class="nav-item" onclick="switchTab('banco')" id="nav-banco"><span class="nav-icon">⏱</span><span class="nav-label">Banco Hrs</span></button>
    <button class="nav-item" onclick="switchTab('funcionarios')" id="nav-funcionarios"><span class="nav-icon">👥</span><span class="nav-label">Equipe</span></button>
    <button class="nav-item" onclick="switchTab('advertencias')" id="nav-advertencias"><span class="nav-icon">⚠️</span><span class="nav-label">Advertências</span></button>
  </div>
</div>

<div class="modal-overlay" id="modal-adv">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nova advertência</div>
    <div class="modal-sub" id="modal-adv-sub"></div>
    <div class="field"><label>Tipo</label>
      <select id="adv-tipo"><option>Falta injustificada</option><option>Atraso recorrente</option><option>Conduta inadequada</option><option>Descumprimento de norma</option><option>Outro</option></select>
    </div>
    <div class="field"><label>Descrição</label><textarea id="adv-desc" rows="3" placeholder="Descreva o ocorrido..."></textarea></div>
    <div class="modal-actions"><button class="btn-sm" onclick="closeModal()">Cancelar</button><button class="btn-primary" onclick="saveAdvRecord()">Registrar</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-func">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Novo funcionário</div>
    <div class="modal-sub">Preencha os dados</div>
    <div class="field"><label>Nome completo</label><input type="text" id="f-nome" placeholder="Ex: João Silva"></div>
    <div class="field"><label>Cargo</label><input type="text" id="f-cargo" placeholder="Ex: Operador"></div>
    <div class="field">
      <label>PIN (4 dígitos)</label>
      <input type="number" id="f-pin" maxlength="4" placeholder="1234">
      <div class="pin-info">Cada funcionário precisa de um PIN único para bater ponto</div>
    </div>
    <div class="field"><label>Carga horária</label>
      <select id="f-carga"><option value="8">8h/dia</option><option value="7.5">7h30/dia</option><option value="6">6h/dia</option><option value="4">4h/dia</option></select>
    </div>
    <div class="modal-actions"><button class="btn-sm" onclick="closeModal()">Cancelar</button><button class="btn-primary" onclick="saveFuncRecord()">Cadastrar</button></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://mcoemytfdrfrtbfbpvqr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jb2VteXRmZHJmcnRiZmJwdnFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTgyODcsImV4cCI6MjA5NTM3NDI4N30.uJZKW5oUlexLo_XENDCohlchGKlG54Pwt0gvqpuy-i8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const ADMIN_PASS = '1234';
const COLORS = ['#e8c547','#4ade80','#60a5fa','#f87171','#fb923c','#c084fc'];
let pin = '', currentAdvFunc = null, currentTab = 'dashboard';
let sbOk = false, funcionarios = [], registros = [], advertencias = [];

// ===================== INIT =====================
async function init() {
  try {
    // Limpa localStorage de dados demo
    localStorage.removeItem('iw_func');
    // Testa conexão
    const { error } = await sb.from('iw_funcionarios').select('id').limit(1);
    sbOk = !error;
    document.getElementById('sync-dot').className = 'sync-dot ' + (sbOk ? 'ok' : 'err');
    if (sbOk) {
      await carregarDados();
    }
  } catch(e) {
    sbOk = false;
    document.getElementById('sync-dot').className = 'sync-dot err';
  }
}

async function carregarDados() {
  // Carrega funcionários do Supabase
  const { data: funcs } = await sb.from('iw_funcionarios').select('*').eq('ativo', true).order('nome');
  if (funcs) {
    funcionarios = funcs.map((f, i) => ({
      id: f.id, nome: f.nome, cargo: f.cargo || '', email: f.email || '',
      pin: f.pin || '', carga: f.carga || 8, color: COLORS[i % COLORS.length]
    }));
  }

  // Carrega registros de hoje
  const hoje = new Date().toISOString().split('T')[0];
  const { data: regs } = await sb.from('iw_registros_ponto')
    .select('*').gte('data_hora', hoje + 'T00:00:00Z').lte('data_hora', hoje + 'T23:59:59Z')
    .order('data_hora');
  if (regs) registros = regs;

  // Carrega advertências
  const { data: advs } = await sb.from('iw_advertencias').select('*').order('criado_em', { ascending: false });
  if (advs) advertencias = advs;

  updateStatusRow();
}

// ===================== CLOCK =====================
function tick() {
  const n = new Date(), pad = x => String(x).padStart(2,'0');
  const el = document.getElementById('clock');
  if(el) el.textContent = pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
  const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const dd = document.getElementById('datedisp');
  if(dd) dd.textContent = days[n.getDay()]+', '+n.getDate()+' '+months[n.getMonth()]+' '+n.getFullYear();
}
setInterval(tick, 1000); tick();

function updateStatusRow() {
  const sr = document.getElementById('status-row'); if(!sr) return;
  const hoje = new Date().toISOString().split('T')[0];
  // Agrupa registros por funcionário — último registro do dia define status
  const statusMap = {};
  registros.forEach(r => {
    const fid = r.funcionario_id;
    if (!statusMap[fid]) statusMap[fid] = [];
    statusMap[fid].push(r);
  });
  sr.innerHTML = funcionarios.map(f => {
    const regsF = statusMap[f.id] || [];
    const ultimo = regsF[regsF.length - 1];
    const dentro = ultimo && ultimo.tipo === 'ENTRADA';
    return '<div class="status-chip"><div class="status-dot '+(dentro?'in':'out')+'"></div>'+f.nome.split(' ')[0]+'</div>';
  }).join('');
}

// ===================== PIN =====================
function pinPress(n){if(pin.length>=4)return;pin+=n;updateDots();if(pin.length===4)setTimeout(pinConfirm,200);}
function pinDel(){pin=pin.slice(0,-1);updateDots();}
function updateDots(){for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('filled',i<pin.length);}

async function pinConfirm() {
  if(!pin) return;
  const func = funcionarios.find(f => f.pin === pin);
  const fb = document.getElementById('feedback');
  if(!func) {
    fb.className='ponto-feedback show-error';
    fb.textContent='PIN incorreto. Tente novamente.';
    pin='';updateDots();
    setTimeout(()=>{fb.className='ponto-feedback';fb.textContent='';},2500);
    return;
  }
  const now = new Date();
  const hoje = now.toISOString().split('T')[0];
  // Verifica último registro do funcionário hoje
  const regsF = registros.filter(r => r.funcionario_id === func.id);
  const ultimo = regsF[regsF.length - 1];
  const tipoNovo = (!ultimo || ultimo.tipo === 'SAIDA') ? 'ENTRADA' : 'SAIDA';
  const novoReg = {
    id: Date.now(),
    funcionario_id: func.id,
    funcionario_nome: func.nome,
    data_hora: now.toISOString(),
    tipo: tipoNovo,
    origem: 'PIN',
    sincronizado_em: now.toISOString()
  };
  // Salva no Supabase
  if(sbOk) await sb.from('iw_registros_ponto').upsert(novoReg).execute();
  registros.push(novoReg);
  updateStatusRow();
  const hora = now.toTimeString().slice(0,5);
  const msg = tipoNovo === 'ENTRADA'
    ? '✓ Entrada — '+func.nome.split(' ')[0]+'. Bom trabalho! '+hora
    : '✓ Saída — '+func.nome.split(' ')[0]+'. Até amanhã! '+hora;
  fb.className='ponto-feedback show-success';fb.textContent=msg;
  pin='';updateDots();
  setTimeout(()=>{fb.className='ponto-feedback';fb.textContent='';},3000);
}

// ===================== TELAS =====================
function showPonto(){
  document.getElementById('screen-ponto').style.display='flex';
  document.getElementById('screen-adminlogin').style.display='none';
  document.getElementById('screen-admin').style.display='none';
}
function showAdminLogin(){
  document.getElementById('screen-ponto').style.display='none';
  document.getElementById('screen-adminlogin').style.display='flex';
  document.getElementById('screen-admin').style.display='none';
  setTimeout(()=>document.getElementById('admin-pw').focus(),100);
}
function adminLogin(){
  if(document.getElementById('admin-pw').value===ADMIN_PASS){
    document.getElementById('admin-pw').value='';
    document.getElementById('screen-ponto').style.display='none';
    document.getElementById('screen-adminlogin').style.display='none';
    document.getElementById('screen-admin').style.display='flex';
    document.getElementById('screen-admin').style.flexDirection='column';
    carregarDados().then(()=>switchTab('dashboard'));
  }else{
    const i=document.getElementById('admin-pw');
    i.style.borderColor='var(--red)';setTimeout(()=>i.style.borderColor='var(--border)',1500);
  }
}

const TAB_TITLES={dashboard:'Dashboard',registros:'Registros',banco:'Banco de Horas',funcionarios:'Equipe',advertencias:'Advertências'};
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const ne=document.getElementById('nav-'+tab);if(ne)ne.classList.add('active');
  const tt=document.getElementById('tab-title');if(tt)tt.textContent=TAB_TITLES[tab]||tab;
  const c=document.getElementById('tab-content');c.innerHTML='<div class="loading-state">Carregando...</div>';c.scrollTop=0;
  if(tab==='dashboard')renderDashboard(c);
  else if(tab==='registros')renderRegistros(c);
  else if(tab==='banco')renderBanco(c);
  else if(tab==='funcionarios')renderFuncionarios(c);
  else if(tab==='advertencias')renderAdvertencias(c);
}

// ===================== DASHBOARD =====================
function renderDashboard(c) {
  const hoje = new Date().toISOString().split('T')[0];
  const statusMap = {};
  registros.forEach(r => { if(!statusMap[r.funcionario_id]) statusMap[r.funcionario_id]=[]; statusMap[r.funcionario_id].push(r); });
  const presentes = Object.values(statusMap).filter(regs => regs[regs.length-1].tipo==='ENTRADA').length;
  const banner = sbOk
    ? '<div class="info-banner ok">🟢 Supabase conectado — dados em tempo real</div>'
    : '<div class="info-banner warn">🔴 Offline — reconecte à internet</div>';
  c.innerHTML = banner +
    '<div class="kpi-grid">'+
    '<div class="kpi-card"><div class="kpi-label">Funcionários</div><div class="kpi-val">'+funcionarios.length+'</div><div class="kpi-sub">cadastrados</div></div>'+
    '<div class="kpi-card"><div class="kpi-label">Presentes</div><div class="kpi-val" style="color:var(--green)">'+presentes+'</div><div class="kpi-sub">agora</div></div>'+
    '<div class="kpi-card"><div class="kpi-label">Registros hoje</div><div class="kpi-val">'+registros.length+'</div><div class="kpi-sub">movimentos</div></div>'+
    '<div class="kpi-card"><div class="kpi-label">Advertências</div><div class="kpi-val" style="color:'+(advertencias.length?'var(--orange)':'var(--text)')+'">'+advertencias.length+'</div><div class="kpi-sub">total</div></div>'+
    '</div>'+
    '<div class="table-wrap"><div class="table-head"><span class="table-head-title">Hoje — '+hoje+'</span></div>'+
    '<table><thead><tr><th>Nome</th><th>Hora</th><th>Tipo</th></tr></thead><tbody>'+
    (registros.length ? registros.map(r=>{
      const hora = new Date(r.data_hora).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      return '<tr><td>'+r.funcionario_nome.split(' ')[0]+'</td><td style="font-family:var(--mono)">'+hora+'</td><td>'+(r.tipo==='ENTRADA'?'<span class="chip chip-green">Entrada</span>':'<span class="chip chip-amber">Saída</span>')+'</td></tr>';
    }).join('') : '<tr><td colspan="3" style="text-align:center;color:var(--text3);padding:1.5rem">Nenhum registro hoje ainda</td></tr>')+
    '</tbody></table></div>';
}

// ===================== REGISTROS =====================
async function renderRegistros(c) {
  c.innerHTML = '<div class="loading-state">Buscando registros...</div>';
  let regs = registros;
  if(sbOk) {
    const { data } = await sb.from('iw_registros_ponto').select('*').order('data_hora', {ascending:false}).limit(100);
    if(data) regs = data;
  }
  c.innerHTML = '<div class="table-wrap"><div class="table-head"><span class="table-head-title">Histórico</span></div>'+
    '<table><thead><tr><th>Data</th><th>Nome</th><th>Hora</th><th>Tipo</th></tr></thead><tbody>'+
    (regs.length ? regs.map(r=>{
      const dt = new Date(r.data_hora);
      const data = dt.toLocaleDateString('pt-BR');
      const hora = dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      return '<tr><td style="font-family:var(--mono);font-size:11px">'+data+'</td><td>'+r.funcionario_nome.split(' ')[0]+'</td><td style="font-family:var(--mono)">'+hora+'</td><td>'+(r.tipo==='ENTRADA'?'<span class="chip chip-green">Entrada</span>':'<span class="chip chip-amber">Saída</span>')+'</td></tr>';
    }).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:1.5rem">Sem registros</td></tr>')+
    '</tbody></table></div>';
}

// ===================== BANCO DE HORAS =====================
function renderBanco(c) {
  c.innerHTML = '<div class="func-list" id="bl"></div>';
  const g = document.getElementById('bl');
  if(!funcionarios.length){g.innerHTML='<div class="empty-state">Nenhum funcionário</div>';return;}
  funcionarios.forEach(f => {
    const d = document.createElement('div'); d.className = 'func-card';
    d.innerHTML = '<div class="func-row"><div class="func-avatar" style="background:'+f.color+'22;color:'+f.color+'">'+f.nome[0]+'</div>'+
      '<div><div class="func-name">'+f.nome+'</div><div class="func-cargo">'+f.cargo+'</div></div></div>'+
      '<div class="func-stats">'+
      '<div class="func-stat"><div class="func-stat-label">Carga diária</div><div class="func-stat-val">'+(f.carga||8)+'h</div></div>'+
      '<div class="func-stat"><div class="func-stat-label">PIN</div><div class="func-stat-val" style="font-family:var(--mono)">'+(f.pin||'—')+'</div></div>'+
      '</div>';
    g.appendChild(d);
  });
}

// ===================== FUNCIONÁRIOS =====================
function renderFuncionarios(c) {
  c.innerHTML = '<div class="section-row"><h3>Equipe ('+funcionarios.length+')</h3><button class="btn-sm accent" onclick="openModalFunc()">+ Novo</button></div><div class="func-list" id="fl"></div>';
  const g = document.getElementById('fl');
  if(!funcionarios.length){g.innerHTML='<div class="empty-state">Nenhum funcionário encontrado no Supabase.</div>';return;}
  funcionarios.forEach(f => {
    const af = advertencias.filter(a=>a.funcionario_id===f.id).length;
    const d = document.createElement('div'); d.className = 'func-card';
    d.innerHTML = '<div class="func-row"><div class="func-avatar" style="background:'+f.color+'22;color:'+f.color+'">'+f.nome[0]+'</div>'+
      '<div style="flex:1"><div class="func-name">'+f.nome+'</div>'+
      '<div class="func-cargo">'+f.cargo+' · PIN <span style="font-family:var(--mono)">'+(f.pin||'<span style="color:var(--orange)">não definido</span>')+'</span></div></div></div>'+
      '<div class="func-stats">'+
      '<div class="func-stat"><div class="func-stat-label">Carga</div><div class="func-stat-val">'+(f.carga||8)+'h/dia</div></div>'+
      '<div class="func-stat"><div class="func-stat-label">Advertências</div><div class="func-stat-val" style="color:'+(af?'var(--orange)':'var(--text)')+'">'+af+'</div></div>'+
      '</div>'+
      '<div class="func-actions">'+
      '<button class="btn-xs" style="color:var(--accent);border-color:rgba(232,197,71,.3)" onclick="editarPin('+f.id+',\''+f.nome+'\')">Definir PIN</button>'+
      '<button class="btn-xs" style="color:var(--orange);border-color:rgba(251,146,60,.3)" onclick=\'openModalAdv('+JSON.stringify({id:f.id,nome:f.nome})+')\'>+ Advertência</button>'+
      '</div>';
    g.appendChild(d);
  });
}

async function editarPin(id, nome) {
  const novoPin = prompt('Definir PIN para '+nome+' (4 dígitos):');
  if(!novoPin || novoPin.length !== 4 || isNaN(parseInt(novoPin))) {
    alert('PIN inválido. Deve ter exatamente 4 dígitos numéricos.');return;
  }
  if(funcionarios.find(f=>f.pin===novoPin && f.id!==id)){alert('PIN já em uso por outro funcionário.');return;}
  if(sbOk) await sb.from('iw_funcionarios').update({pin: novoPin}).eq('id', id).execute();
  const f = funcionarios.find(f=>f.id===id);
  if(f) f.pin = novoPin;
  alert('PIN definido com sucesso!');
  renderFuncionarios(document.getElementById('tab-content'));
}

// ===================== ADVERTÊNCIAS =====================
function renderAdvertencias(c) {
  c.innerHTML = '<div class="section-row"><h3>Advertências</h3><span style="font-size:12px;color:var(--text2)">'+advertencias.length+' reg.</span></div><div id="al"></div>';
  const al = document.getElementById('al');
  if(!advertencias.length){al.innerHTML='<div class="empty-state">Nenhuma advertência</div>';return;}
  advertencias.forEach(a=>{
    al.innerHTML+='<div class="adv-card">'+
      '<div class="adv-name">'+(a.funcionario_nome||'').split(' ')[0]+' <span class="chip chip-orange">'+(a.tipo||'')+'</span></div>'+
      '<div class="adv-desc">'+(a.descricao||'Sem descrição')+'</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">'+
      '<div class="adv-date">'+(a.data_registro||'')+'</div>'+
      '<button class="btn-xs" style="color:var(--red);border-color:rgba(248,113,113,.3)" onclick="removeAdv('+a.id+')">Remover</button></div></div>';
  });
}

async function removeAdv(id){
  if(sbOk) await sb.from('iw_advertencias').delete().eq('id',id).execute();
  advertencias = advertencias.filter(a=>a.id!==id);
  renderAdvertencias(document.getElementById('tab-content'));
}

// ===================== MODAIS =====================
function openModalAdv(func){currentAdvFunc=func;document.getElementById('modal-adv-sub').textContent='Funcionário: '+func.nome;document.getElementById('modal-adv').classList.add('open');}
function openModalFunc(){document.getElementById('modal-func').classList.add('open');}
function closeModal(){document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open'));currentAdvFunc=null;}
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModal();}));

async function saveAdvRecord(){
  if(!currentAdvFunc)return;
  const adv={
    id: Date.now(), funcionario_id: currentAdvFunc.id, funcionario_nome: currentAdvFunc.nome,
    tipo: document.getElementById('adv-tipo').value,
    descricao: document.getElementById('adv-desc').value,
    data_registro: new Date().toLocaleDateString('pt-BR'),
    criado_em: new Date().toISOString()
  };
  if(sbOk) await sb.from('iw_advertencias').upsert(adv).execute();
  advertencias.unshift(adv);
  document.getElementById('adv-desc').value='';closeModal();
  if(currentTab==='advertencias')renderAdvertencias(document.getElementById('tab-content'));
  else if(currentTab==='funcionarios')renderFuncionarios(document.getElementById('tab-content'));
}

async function saveFuncRecord(){
  const nome=document.getElementById('f-nome').value.trim();
  const cargo=document.getElementById('f-cargo').value.trim();
  const pv=document.getElementById('f-pin').value.trim();
  const carga=parseFloat(document.getElementById('f-carga').value);
  if(!nome||!cargo||pv.length!==4||isNaN(parseInt(pv))){alert('Preencha todos os campos. PIN deve ter 4 dígitos.');return;}
  if(funcionarios.find(f=>f.pin===pv)){alert('PIN já em uso.');return;}
  const func={id:Date.now(),nome,cargo,pin:pv,carga,ativo:true,atualizado_em:new Date().toISOString()};
  if(sbOk) await sb.from('iw_funcionarios').upsert(func).execute();
  funcionarios.push({...func,color:COLORS[funcionarios.length%COLORS.length]});
  ['f-nome','f-cargo','f-pin'].forEach(id=>document.getElementById(id).value='');
  closeModal();
  renderFuncionarios(document.getElementById('tab-content'));
}

init();
</script>
