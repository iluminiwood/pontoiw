<style>
:root{
  --bg:#0a0a0c;--s1:#111114;--s2:#18181c;--s3:#222228;
  --b1:#2a2a32;--b2:#383844;
  --acc:#f0c040;--acc2:#f8d060;
  --g:#3dd68c;--r:#f87171;--o:#fb923c;--bl:#60a5fa;--pu:#c084fc;
  --gd:rgba(61,214,140,.12);--rd:rgba(248,113,113,.12);--od:rgba(251,146,60,.12);
  --bld:rgba(96,165,250,.12);--ad:rgba(240,192,64,.12);--pud:rgba(192,132,252,.12);
  --t1:#f0f0f2;--t2:#8888a0;--t3:#44444e;
  --font:'Cabinet Grotesk',sans-serif;--mono:'DM Mono',monospace;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;
}
[data-theme="light"]{
  --bg:#f4f4f6;--s1:#ffffff;--s2:#f0f0f3;--s3:#e8e8ec;
  --b1:#dcdce8;--b2:#c8c8d8;
  --acc:#c89a00;--acc2:#d4a800;
  --g:#16a34a;--r:#dc2626;--o:#ea580c;--bl:#2563eb;--pu:#9333ea;
  --gd:rgba(22,163,74,.1);--rd:rgba(220,38,38,.1);--od:rgba(234,88,12,.1);

  --t1:#111118;--t2:#55556a;--t3:#aaaabc;
}
.theme-toggle{
  width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;
  background:var(--b2);position:relative;transition:background .2s;flex-shrink:0;
}
.theme-toggle::after{
  content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;
  border-radius:50%;background:var(--t2);transition:all .2s;
}
[data-theme="light"] .theme-toggle{background:var(--acc);}
[data-theme="light"] .theme-toggle::after{left:19px;background:#fff;}
.theme-icon{font-size:13px;line-height:1;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100vh;}
body{font-family:var(--font);background:var(--bg);color:var(--t1);font-size:14px;}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}

.login-logo{font-size:11px;font-weight:800;letter-spacing:.2em;color:var(--acc);text-transform:uppercase;margin-bottom:1.5rem;}

.field{margin-bottom:1rem;}
.field label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);display:block;margin-bottom:.4rem;}
.field input,.field select,.field textarea{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r8);padding:11px 12px;font-family:var(--font);font-size:14px;color:var(--t1);outline:none;}
.field input:focus,.field select:focus{border-color:var(--acc);}
.field textarea{resize:none;}
.btn{width:100%;padding:12px;background:var(--acc);border:none;border-radius:var(--r8);font-family:var(--font);font-size:14px;font-weight:800;color:#000;cursor:pointer;}
.btn:active{background:var(--acc2);}
.err-msg{font-size:12px;color:var(--r);text-align:center;margin-top:.75rem;min-height:18px;}
#app{display:none;flex-direction:column;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;background:var(--s1);border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:20;}
.tb-brand{font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--acc);text-transform:uppercase;}

.btn-sm{padding:5px 11px;border-radius:var(--r8);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--b1);background:var(--s2);color:var(--t2);}

<script>

const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jb2VteXRmZHJmcnRiZmJwdnFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTgyODcsImV4cCI6MjA5NTM3NDI4N30.uJZKW5oUlexLo_XENDCohlchGKlG54Pwt0gvqpuy-i8';
const ADMIN_HASH='03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4';
const sb=supabase.createClient(SB_URL,SB_KEY);
const COLORS=['#f0c040','#3dd68c','#60a5fa','#f87171','#fb923c','#c084fc','#34d399'];
const JORNADA={1:540,2:540,3:540,4:540,5:480}; // Seg-Qui 9h, Sex 8h
const ENTRADA_PAD='07:00', SAIDA_SEMANA='17:30', SAIDA_SEX='16:30', TOL=5;

let funcionarios=[],advertencias=[],currentTab='dash',sbOk=false;
let loginAttempts=0,loginBlocked=false,currentAdvFunc=null,sessionTimer=null;
let editCtx=null, addCtx=null;
let feriados=new Set(); // Set de strings "YYYY-MM-DD"

function isFeriado(ds){return feriados.has(ds);}
function isDiaUtil(ds){
  const dw=new Date(ds+'T12:00:00').getDay();
  return dw>=1&&dw<=5&&!isFeriado(ds);
}

// ===== HELPERS =====
function toMin(hhmm){if(!hhmm)return 0;const[h,m]=hhmm.split(':').map(Number);return h*60+m;}
function fromMin(min){
  const neg=min<0,abs=Math.abs(min);
  const h=Math.floor(abs/60),m=abs%60;
  return (neg?'-':'')+h+'h'+(m?(m<10?'0':'')+m+'min':'');
}
function fmtData(ds){
  const d=new Date(ds+'T12:00:00');
  return ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()]+' '+d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}
function getSemana(ds){
  const d=new Date(ds+'T12:00:00');
  const dow=d.getDay()===0?7:d.getDay();
  const seg=new Date(d);seg.setDate(d.getDate()-(dow-1));
  return seg.toISOString().split('T')[0];
}
function jornadaMin(ds){return JORNADA[new Date(ds+'T12:00:00').getDay()]||0;}
function isDiaCompleto(ds, bats){
  // Dia é incompleto se for hoje E a última batida for ENTRADA
  const hoje=new Date().toISOString().split('T')[0];
  if(ds!==hoje) return true;
  if(!bats||!bats.length) return false;
  const sorted=[...bats].sort((a,b)=>a.hora.localeCompare(b.hora));
  return sorted[sorted.length-1].tipo==='SAIDA';
}
function saidaPadrao(ds){return new Date(ds+'T12:00:00').getDay()===5?SAIDA_SEX:SAIDA_SEMANA;}

function calcTrab(bats){
  const s=[...bats].sort((a,b)=>a.hora.localeCompare(b.hora));
  let t=0;
  for(let i=0;i<s.length-1;i++){
    if(s[i].tipo==='ENTRADA'&&s[i+1].tipo==='SAIDA'){t+=toMin(s[i+1].hora)-toMin(s[i].hora);i++;}
  }
  return t;
}

function getPeriodo(p){
  const hoje=new Date(),hs=hoje.toISOString().split('T')[0];
  if(p==='semana') return {ini:getSemana(hs),fim:hs};
  if(p==='mes'){const m=hoje.toISOString().slice(0,7);return{ini:m+'-01',fim:hs};}
  if(p==='mes-ant'){
    const ma=new Date(hoje.getFullYear(),hoje.getMonth()-1,1);
    const mf=new Date(hoje.getFullYear(),hoje.getMonth(),0);
    return{ini:ma.toISOString().split('T')[0],fim:mf.toISOString().split('T')[0]};
  }
  return{ini:'2026-02-01',fim:hs};
}

// ===== AUTH =====
// ===== TEMA =====
function toggleTheme(){
  const curr=document.documentElement.getAttribute('data-theme');
  const next=curr==='light'?'dark':'light';
  applyTheme(next);
  localStorage.setItem('iw-theme',next);
}
function applyTheme(theme){
  if(theme==='light'){
    document.documentElement.setAttribute('data-theme','light');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
}
// Aplica tema salvo ao carregar
(function(){
  const saved=localStorage.getItem('iw-theme')||'dark';
  applyTheme(saved);
})();

async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function doLogin(){
  if(loginBlocked){document.getElementById('lerr').textContent='Bloqueado. Aguarde 1 minuto.';return;}
  const pw=document.getElementById('lpw').value;
  if(!pw){return;}
  const hash=await sha256(pw);
  if(hash===ADMIN_HASH){
    loginAttempts=0;
    document.getElementById('lpw').value='';
    document.getElementById('lerr').textContent='';
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.cssText='display:flex;flex-direction:column;';
    await initApp();goTab('dash');resetSession();
  } else {
    loginAttempts++;
    if(loginAttempts>=3){
      loginBlocked=true;
      document.getElementById('lerr').textContent='Bloqueado por 1 minuto.';
      setTimeout(()=>{loginBlocked=false;loginAttempts=0;document.getElementById('lerr').textContent='';},60000);
    } else {
      document.getElementById('lerr').textContent=`Senha incorreta. ${3-loginAttempts} tentativa(s).`;
    }
  }
}

function calcSaldoRegs(regs){
  const cpfsAtivos=new Set(funcionarios.map(f=>f.cpf));
  const mapa={};
  regs.forEach(r=>{
    if(!cpfsAtivos.has(r.cpf)) return;
    if(!mapa[r.cpf]) mapa[r.cpf]={};
    if(!mapa[r.cpf][r.data_local]) mapa[r.cpf][r.data_local]=[];
    mapa[r.cpf][r.data_local].push({hora:r.data_hora_local?.slice(11,16)||'00:00',tipo:r.tipo});
  });
  let total=0;
  Object.values(mapa).forEach(dias=>Object.entries(dias).forEach(([data,bats])=>{
    if(!isDiaUtil(data))return;
    if(!isDiaCompleto(data,bats))return; // ignora dia em andamento
    const j=jornadaMin(data);if(!j)return;
    total+=calcTrab(bats)-j;
  }));
  return total;
}

function renderRanking(regs){
  const el=document.getElementById('ranking');if(!el)return;
  const cpfsAtivos=new Set(funcionarios.map(f=>f.cpf));
  const fmap={};funcionarios.forEach(f=>{fmap[f.cpf]=f;});
  const stats={};
  regs.forEach(r=>{
    if(!r.cpf||!cpfsAtivos.has(r.cpf)) return;
    const f=fmap[r.cpf];if(!f)return;
    if(!stats[r.cpf]) stats[r.cpf]={nome:f.nome,atrasos:0,dias:new Set()};
    stats[r.cpf].dias.add(r.data_local);
    if(r.tipo==='ENTRADA'){
      const h=r.data_hora_local?.slice(11,16)||'00:00';
      if(toMin(h)<=toMin('10:00')&&toMin(h)-toMin(ENTRADA_PAD)>TOL) stats[r.cpf].atrasos++;
    }
  });
  const ranked=Object.entries(stats)
    .map(([cpf,s])=>({cpf,nome:s.nome||'—',atrasos:s.atrasos,dias:s.dias.size}))
    .sort((a,b)=>a.atrasos-b.atrasos||b.dias-a.dias);
  const medals=['🥇','🥈','🥉'];
  el.innerHTML=ranked.length?ranked.map((r,i)=>{
    const f=fmap[r.cpf]||{color:COLORS[i%7]};
    const nome=r.nome||'?';
    const cor=r.atrasos===0?'var(--g)':r.atrasos<3?'var(--o)':'var(--r)';
    return`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(42,42,50,.4)">
      <span style="font-size:10px;color:var(--t3);width:16px">${i+1}</span>
      <div style="width:28px;height:28px;border-radius:50%;background:${f.color}22;color:${f.color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">${nome[0]}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:700">${nome.split(' ')[0]} ${medals[i]||''}</div>
        <div style="font-size:10px;color:var(--t2)">${r.dias} dias trabalhados</div></div>
      <span style="font-family:var(--mono);font-size:12px;font-weight:600;color:${cor}">${r.atrasos===0?'Sem atrasos':r.atrasos+' atraso'+(r.atrasos>1?'s':'')}</span>
    </div>`;
  }).join(''):'<div class="empty">Sem dados este mês</div>';
}

async function reloadBatidas(){
  const el=document.getElementById('bat-body');if(!el)return;
  el.innerHTML='<div class="loading">Carregando...</div>';
  const per=document.getElementById('b-periodo')?.value||'mes';
  const cpfF=document.getElementById('b-func')?.value||'';
  const{ini,fim}=getPeriodo(per);
  let q=sb.from('iw_registros_ponto').select('*').gte('data_local',ini).lte('data_local',fim).order('id');
  if(cpfF) q=q.eq('cpf',cpfF);
  const{data:regs}=await q;
  const todos=regs||[];

  const porCpf={};
  todos.forEach(r=>{
    if(!porCpf[r.cpf]) porCpf[r.cpf]={nome:r.funcionario_nome,dias:{}};
    if(!porCpf[r.cpf].dias[r.data_local]) porCpf[r.cpf].dias[r.data_local]=[];
    porCpf[r.cpf].dias[r.data_local].push({id:r.id,nsr:r.nsr,hora:r.data_hora_local?.slice(11,16)||'00:00',tipo:r.tipo,origem:r.origem,cpf:r.cpf,nome:r.funcionario_nome,data:r.data_local});
  });

  const fmap={};funcionarios.forEach(f=>{fmap[f.cpf]=f;});
  const cpfsExib=cpfF?[cpfF]:funcionarios.map(f=>f.cpf);
  let html='';

  cpfsExib.forEach(cpf=>{
    const f=fmap[cpf];if(!f)return;
    const pf=porCpf[cpf]||{nome:f.nome,dias:{}};
    if(!Object.keys(pf.dias).length)return;

    const semanas={};
    Object.entries(pf.dias).forEach(([data,bats])=>{
      const sem=getSemana(data);
      if(!semanas[sem])semanas[sem]=[];
      semanas[sem].push({data,bats:[...bats].sort((a,b)=>a.hora.localeCompare(b.hora))});
    });

    let saldoTotal=0,semHtml='';
    Object.entries(semanas).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([semIni,dias])=>{
      let saldoSem=0,diasHtml='';
      dias.sort((a,b)=>a.data.localeCompare(b.data)).forEach(({data,bats})=>{
        const jMin=jornadaMin(data),trab=calcTrab(bats);
        const completo=isDiaCompleto(data,bats);
        const saldo=jMin&&completo?trab-jMin:jMin&&!completo&&trab>0?trab-jMin:0;
        saldoSem+=saldo;saldoTotal+=saldo;
        const batsHtml=bats.map(b=>{
          const isEdit=b.origem==='MANUAL'||b.origem==='EDITADO_MANUAL';
          const cls=isEdit?'edit':b.tipo==='ENTRADA'?'ent':'sai';
          const seta=b.tipo==='ENTRADA'?'↑':'↓';
          return`<span class="bbat ${cls}" onclick="abrirEdit(${JSON.stringify(b).replace(/"/g,'&quot;')})" title="${isEdit?'Editado manualmente·':''} Clique para editar">${b.hora}${seta}</span>`;
        }).join('<span style="color:var(--b2);font-size:9px">·</span>');
        const sc=saldo>=0?'var(--g)':saldo<-30?'var(--r)':'var(--o)';
        diasHtml+=`<div class="bdia">
          <span class="bdia-data">${fmtData(data)}</span>
          <div class="bdia-batidas">${batsHtml}
            <span onclick="abrirAdd('${data}','${cpf}','${f.nome.replace(/'/g,"\\'")}')" style="cursor:pointer;font-size:11px;color:var(--t3);padding:1px 3px;border-radius:3px;border:1px dashed var(--b2)" title="Adicionar batida">+</span>
          </div>
          <span class="bdia-hrs">${trab?fromMin(trab):'—'}</span>
          <span class="bdia-saldo" style="color:${jMin?sc:'var(--t3)'}">${jMin?(saldo>=0?'+':'')+fromMin(saldo):'—'}</span>
        </div>`;
      });
      const sf=new Date(semIni+'T12:00:00');sf.setDate(sf.getDate()+4);
      const sc=saldoSem>=0?'var(--g)':saldoSem<-30?'var(--r)':'var(--o)';
      semHtml+=`<div class="bsemana">
        <div class="bsemana-head">
          <span class="bsemana-lbl">Semana ${new Date(semIni+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}–${sf.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}</span>
          <span class="bsemana-saldo" style="color:${sc}">${saldoSem>=0?'+':''}${fromMin(saldoSem)}</span>
        </div>${diasHtml}</div>`;
    });

    const sc=saldoTotal>=0?'var(--g)':saldoTotal<-60?'var(--r)':'var(--o)';
    html+=`<div class="bfunc">
      <div class="bfunc-head">
        <div class="fav" style="background:${f.color}22;color:${f.color}">${f.nome[0]}</div>
        <div class="bfunc-info"><div class="bfunc-name">${f.nome.split(' ')[0]}</div><div class="bfunc-sub">${f.cargo||'—'} · ${Object.keys(pf.dias).length} dias</div></div>
        <div class="bfunc-saldo"><div class="bfunc-saldo-lbl">Saldo período</div><div class="bfunc-saldo-val" style="color:${sc}">${saldoTotal>=0?'+':''}${fromMin(saldoTotal)}</div></div>
      </div>${semHtml||'<div class="empty" style="padding:1rem">Sem registros</div>'}
    </div>`;
  });

  el.innerHTML=html||'<div class="empty">Nenhum registro no período</div>';
}

async function reloadBanco(){
  const el=document.getElementById('banco-body');if(!el)return;
  el.innerHTML='<div class="loading">Calculando...</div>';
  const per=document.getElementById('banco-per')?.value||'mes';
  const{ini,fim}=getPeriodo(per);
  const{data:regs}=await sb.from('iw_registros_ponto').select('*').gte('data_local',ini).lte('data_local',fim).order('id');
  const todos=regs||[];

  const porCpf={};
  todos.forEach(r=>{
    if(!porCpf[r.cpf])porCpf[r.cpf]={nome:r.funcionario_nome,dias:{}};
    if(!porCpf[r.cpf].dias[r.data_local])porCpf[r.cpf].dias[r.data_local]=[];
    porCpf[r.cpf].dias[r.data_local].push({hora:r.data_hora_local?.slice(11,16)||'00:00',tipo:r.tipo});
  });

  let saldoGeral=0,html='<div class="flist">';

  funcionarios.forEach((f,i)=>{
    const pf=porCpf[f.cpf]||{dias:{}};
    let saldo=0,dias=0,extras=0,devendo=0,atrasos=0,faltas=0;

    // Calcula dias esperados no período
    const dIni=new Date(ini+'T12:00:00'),dFim=new Date(fim+'T12:00:00');
    for(let d=new Date(dIni);d<=dFim;d.setDate(d.getDate()+1)){
      const ds=d.toISOString().split('T')[0];
      if(!isDiaUtil(ds)) continue; // ignora fins de semana e feriados
      const bats=pf.dias[ds];
      if(!bats||!bats.length){faltas++;continue;}
      if(!isDiaCompleto(ds,bats))continue; // dia em andamento, não conta
      const j=jornadaMin(ds);
      const t=calcTrab(bats),s=t-j;
      saldo+=s;dias++;
      if(s>0)extras+=s;else if(s<0)devendo+=Math.abs(s);
      const sorted=[...bats].sort((a,b)=>a.hora.localeCompare(b.hora));
      const ent=sorted.find(b=>b.tipo==='ENTRADA'&&toMin(b.hora)<=toMin('10:00'));
      if(ent&&toMin(ent.hora)-toMin(ENTRADA_PAD)>TOL) atrasos++;
    }
    saldoGeral+=saldo;
    const sc=saldo>=0?'var(--g)':saldo<-60?'var(--r)':'var(--o)';
    html+=`<div class="fcard">
      <div class="frow">
        <div class="fav" style="background:${f.color}22;color:${f.color}">${f.nome[0]}</div>
        <div style="flex:1"><div class="fname">${f.nome.split(' ')[0]}</div><div class="fcargo">${f.cargo||'—'}</div></div>
        <div style="text-align:right">
          <div style="font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em">Saldo banco</div>
          <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:${sc}">${saldo>=0?'+':''}${fromMin(saldo)}</div>
        </div>
      </div>
      <div class="fstats">
        <div class="fstat"><div class="fstat-l">Dias trabalhados</div><div class="fstat-v">${dias}</div></div>
        <div class="fstat"><div class="fstat-l">Horas extras</div><div class="fstat-v" style="color:var(--g)">+${fromMin(extras)}</div></div>
        <div class="fstat"><div class="fstat-l">Horas devendo</div><div class="fstat-v" style="color:${devendo?'var(--r)':'var(--t1)'}">${devendo?'-'+fromMin(devendo):'0h'}</div></div>
        <div class="fstat"><div class="fstat-l">Atrasos</div><div class="fstat-v" style="color:${atrasos?'var(--o)':'var(--g)'}">${atrasos}</div></div>
        <div class="fstat"><div class="fstat-l">Faltas</div><div class="fstat-v" style="color:${faltas?'var(--r)':'var(--g)'}">${faltas}</div></div>
        <div class="fstat"><div class="fstat-l">Jornada</div><div class="fstat-v">44h/sem</div></div>
      </div>
    </div>`;
  });

  const gc=saldoGeral>=0?'var(--g)':saldoGeral<-120?'var(--r)':'var(--o)';
  const perLabels={mes:'mês atual',semana:'semana','mes-ant':'mês anterior',tudo:'total geral'};const perLabel=perLabels[per]||per;
  html+=`</div>
  <div class="tcard">
    <div class="thead-row">
      <span class="thead-title">Saldo total — ${perLabel}</span>
      <span style="font-family:var(--mono);font-size:16px;font-weight:700;color:${gc}">${saldoGeral>=0?'+':''}${fromMin(saldoGeral)}</span>
    </div>
    <div style="padding:.75rem 1rem;font-size:12px;color:var(--t2);line-height:1.8">
      Seg–Qui: 07:00–17:30 (9h líquidas) · Sex: 07:00–16:30 (8h líquidas)<br>
      Almoço: 12:00–13:30 · Carga semanal: 44h · Tolerância: ${TOL} min
    </div>
  </div>`;
  el.innerHTML=html;
}

// ===== ATRASOS =====
async function renderAtrasos(c){
  c.innerHTML=`
  <div class="filter-bar">
    <select id="atr-per" onchange="reloadAtrasos()">
      <option value="mes">Mês atual</option>
      <option value="semana">Esta semana</option>
      <option value="mes-ant">Mês anterior</option>
      <option value="tudo">Total geral</option>
    </select>
  </div>
  <div id="atr-body"><div class="loading">Carregando...</div></div>`;
  await reloadAtrasos();
}

async function reloadAtrasos(){
  const el=document.getElementById('atr-body');if(!el)return;
  el.innerHTML='<div class="loading">Calculando...</div>';
  const per=document.getElementById('atr-per')?.value||'mes';
  const{ini,fim}=getPeriodo(per);
  const{data:regs}=await sb.from('iw_registros_ponto').select('*').gte('data_local',ini).lte('data_local',fim).order('id');
  const todos=regs||[];

  const porCpf={};
  todos.forEach(r=>{
    if(!porCpf[r.cpf])porCpf[r.cpf]={nome:r.funcionario_nome,dias:{}};
    if(!porCpf[r.cpf].dias[r.data_local])porCpf[r.cpf].dias[r.data_local]=[];
    porCpf[r.cpf].dias[r.data_local].push({hora:r.data_hora_local?.slice(11,16)||'00:00',tipo:r.tipo});
  });

  const fmap={};funcionarios.forEach(f=>{fmap[f.cpf]=f;});
  let html='<div class="flist">';

  funcionarios.forEach((f,i)=>{
    const pf=porCpf[f.cpf]||{dias:{}};
    const ocorrencias=[];

    const dIni=new Date(ini+'T12:00:00'),dFim=new Date(fim+'T12:00:00');
    for(let d=new Date(dIni);d<=dFim;d.setDate(d.getDate()+1)){
      const ds=d.toISOString().split('T')[0];
      if(!isDiaUtil(ds))continue; // ignora fins de semana e feriados
      const bats=pf.dias[ds];

      // Falta
      if(!bats||!bats.length){
        ocorrencias.push({tipo:'falta',data:ds,desc:'Falta — sem registro no dia'});
        continue;
      }

      const sorted=[...bats].sort((a,b)=>a.hora.localeCompare(b.hora));

      // Atraso na entrada
      const ent=sorted.find(b=>b.tipo==='ENTRADA'&&toMin(b.hora)<=toMin('10:00'));
      if(ent){
        const at=toMin(ent.hora)-toMin(ENTRADA_PAD);
        if(at>TOL) ocorrencias.push({tipo:'atraso',data:ds,desc:`Entrada às ${ent.hora} — ${at} min de atraso`});
      }

      // Saída antecipada
      const saidas=sorted.filter(b=>b.tipo==='SAIDA'&&toMin(b.hora)>=toMin('15:00'));
      const ultSaida=saidas[saidas.length-1];
      if(ultSaida){
        const padSaida=saidaPadrao(ds);
        const diff=toMin(padSaida)-toMin(ultSaida.hora);
        if(diff>TOL) ocorrencias.push({tipo:'saida',data:ds,desc:`Saída às ${ultSaida.hora} — ${diff} min antes do horário`});
      }
    }

    if(!ocorrencias.length){
      html+=`<div class="fcard">
        <div class="frow">
          <div class="fav" style="background:${f.color}22;color:${f.color}">${f.nome[0]}</div>
          <div style="flex:1"><div class="fname">${f.nome.split(' ')[0]}</div><div class="fcargo">${f.cargo||'—'}</div></div>
          <span class="chip g">Sem ocorrências</span>
        </div>
      </div>`;
      return;
    }

    const nAtrasos=ocorrencias.filter(o=>o.tipo==='atraso').length;
    const nFaltas=ocorrencias.filter(o=>o.tipo==='falta').length;
    const nSaidas=ocorrencias.filter(o=>o.tipo==='saida').length;

    const itensHtml=ocorrencias.map(o=>{
      const cls=o.tipo==='falta'?'r':o.tipo==='atraso'?'o':'b';
      const icon=o.tipo==='falta'?'✕':o.tipo==='atraso'?'↑':'↓';
      return`<div class="atr-row">
        <span class="chip ${cls}" style="flex-shrink:0">${icon}</span>
        <span style="font-size:11px;color:var(--t2);width:72px;flex-shrink:0">${fmtData(o.data)}</span>
        <span style="font-size:12px;flex:1">${o.desc}</span>
      </div>`;
    }).join('');

    html+=`<div class="fcard">
      <div class="frow">
        <div class="fav" style="background:${f.color}22;color:${f.color}">${f.nome[0]}</div>
        <div style="flex:1"><div class="fname">${f.nome.split(' ')[0]}</div><div class="fcargo">${f.cargo||'—'}</div></div>
        <div style="display:flex;gap:5px;flex-shrink:0">
          ${nAtrasos?`<span class="chip o">${nAtrasos} atraso${nAtrasos>1?'s':''}</span>`:''}
          ${nFaltas?`<span class="chip r">${nFaltas} falta${nFaltas>1?'s':''}</span>`:''}
          ${nSaidas?`<span class="chip b">${nSaidas} saída ant.</span>`:''}
        </div>
      </div>
      <div style="border-top:1px solid var(--b1);margin-top:.5rem;padding-top:.5rem">${itensHtml}</div>
    </div>`;
  });

  html+='</div>';
  el.innerHTML=html;
}

// ===== EQUIPE =====
async function renderEquipe(c){
  c.innerHTML=`<div class="srow"><h3>Funcionários (${funcionarios.length})</h3><button class="btn-sm accent" onclick="document.getElementById('m-func').classList.add('open')">+ Novo</button></div><div class="flist" id="flist"></div>`;
  const g=document.getElementById('flist');
  if(!funcionarios.length){g.innerHTML='<div class="empty">Nenhum funcionário.</div>';return;}
  funcionarios.forEach(f=>{
    const af=advertencias.filter(a=>a.funcionario_id===f.id).length;
    const d=document.createElement('div');d.className='fcard';
    d.innerHTML=`<div class="frow">
      <div class="fav" style="background:${f.color}22;color:${f.color}">${f.nome[0]}</div>
      <div style="flex:1"><div class="fname">${f.nome.split(' ')[0]}</div>
        <div class="fcargo">${f.cargo||'—'} · CPF <span style="font-family:var(--mono)">${f.cpf||'—'}</span></div></div>
    </div>
    <div class="fstats" style="grid-template-columns:1fr 1fr">
      <div class="fstat"><div class="fstat-l">Carga semanal</div><div class="fstat-v">44h</div></div>
      <div class="fstat"><div class="fstat-l">Advertências</div><div class="fstat-v" style="color:${af?'var(--o)':'var(--t1)'}">${af}</div></div>
    </div>
    <div class="factions">
      <button class="btn-xs" style="color:var(--acc);border-color:rgba(240,192,64,.3)" onclick="editPin(${f.id},'${f.nome.replace(/'/g,"\\'")}')">Editar PIN</button>
      <button class="btn-xs" style="color:var(--o);border-color:rgba(251,146,60,.3)" onclick='openModalAdv({id:${f.id},nome:"${f.nome.replace(/"/g,'\\"')}",cpf:"${f.cpf||''}"})'>+ Advertência</button>
    </div>`;
    g.appendChild(d);
  });
}
async function editPin(id,nome){
  const np=prompt(`PIN para ${nome.split(' ')[0]} (4 dígitos):`);
  if(!np||np.length!==4||isNaN(parseInt(np))){alert('PIN inválido.');return;}
  if(funcionarios.find(f=>f.pin===np&&f.id!==id)){alert('PIN já em uso.');return;}
  await sb.from('iw_funcionarios').update({pin:np}).eq('id',id);
  await loadBase();renderEquipe(document.getElementById('content'));
}

// ===== ADVERTÊNCIAS =====
function renderAdv(c){
  c.innerHTML=`<div class="srow"><h3>Advertências</h3><span style="font-size:11px;color:var(--t2)">${advertencias.length} total</span></div><div id="al"></div>`;
  const al=document.getElementById('al');
  if(!advertencias.length){al.innerHTML='<div class="empty">Nenhuma advertência.</div>';return;}
  advertencias.forEach(a=>{
    al.innerHTML+=`<div class="advcard">
      <div style="font-size:13px;font-weight:700;margin-bottom:3px">${(a.funcionario_nome||'').split(' ')[0]} <span class="chip o">${a.tipo||''}</span></div>
      <div style="font-size:12px;color:var(--t2);line-height:1.5">${a.descricao||'Sem descrição'}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
        <span style="font-size:11px;color:var(--t3)">${a.data_registro||''}</span>
        <button class="btn-xs" style="color:var(--r);border-color:rgba(248,113,113,.3)" onclick="delAdv(${a.id})">Remover</button>
      </div></div>`;
  });
}
async function delAdv(id){
  await sb.from('iw_advertencias').delete().eq('id',id);
  advertencias=advertencias.filter(a=>a.id!==id);
  renderAdv(document.getElementById('content'));
}

// ===== MODAIS =====
function openModalAdv(func){currentAdvFunc=func;document.getElementById('m-adv-sub').textContent='Funcionário: '+func.nome.split(' ')[0];document.getElementById('m-adv').classList.add('open');}
function closeModals(){document.querySelectorAll('.moverlay').forEach(m=>m.classList.remove('open'));currentAdvFunc=null;editCtx=null;addCtx=null;}
document.querySelectorAll('.moverlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModals();}));

async function saveAdv(){
  if(!currentAdvFunc)return;
  const adv={id:Date.now(),funcionario_id:currentAdvFunc.id,funcionario_nome:currentAdvFunc.nome,tipo:document.getElementById('adv-tipo').value,descricao:document.getElementById('adv-desc').value,data_registro:new Date().toLocaleDateString('pt-BR'),criado_em:new Date().toISOString()};
  await sb.from('iw_advertencias').upsert(adv);
  advertencias.unshift(adv);document.getElementById('adv-desc').value='';closeModals();
  if(currentTab==='adv')renderAdv(document.getElementById('content'));
}
async function saveFunc(){
  const nome=document.getElementById('f-nome').value.trim();
  const cargo=document.getElementById('f-cargo').value.trim();
  const pv=document.getElementById('f-pin').value.trim();
  const cpf=document.getElementById('f-cpf').value.trim();
  if(!nome||!cargo||pv.length!==4||isNaN(parseInt(pv))){alert('Preencha nome, cargo e PIN.');return;}
  if(funcionarios.find(f=>f.pin===pv)){alert('PIN já em uso.');return;}
  await sb.from('iw_funcionarios').insert({id:Date.now(),nome,cargo,pin:pv,cpf,carga:9,ativo:true,atualizado_em:new Date().toISOString()});
  ['f-nome','f-cargo','f-pin','f-cpf'].forEach(id=>document.getElementById(id).value='');
  closeModals();await loadBase();renderEquipe(document.getElementById('content'));
}
</script>
