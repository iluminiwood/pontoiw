<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IW · Gestão de Ponto</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Cabinet+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0a0a0c;--s1:#111114;--s2:#18181c;--s3:#222228;
  --b1:#2a2a32;--b2:#383844;
  --acc:#f0c040;--acc2:#f8d060;
  --g:#3dd68c;--r:#f87171;--o:#fb923c;--bl:#60a5fa;--pu:#c084fc;
  --gd:rgba(61,214,140,.12);--rd:rgba(248,113,113,.12);--od:rgba(251,146,60,.12);
  --bld:rgba(96,165,250,.12);--ad:rgba(240,192,64,.12);--pud:rgba(192,132,252,.12);
  --t1:#f0f0f2;--t2:#8888a0;--t3:#44444e;
  --font:'Cabinet Grotesk',sans-serif;--mono:'DM Mono',monospace;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;
}
[data-theme="light"]{
  --bg:#f4f4f6;--s1:#ffffff;--s2:#f0f0f3;--s3:#e8e8ec;
  --b1:#dcdce8;--b2:#c8c8d8;
  --acc:#c89a00;--acc2:#d4a800;
  --g:#16a34a;--r:#dc2626;--o:#ea580c;--bl:#2563eb;--pu:#9333ea;
  --gd:rgba(22,163,74,.1);--rd:rgba(220,38,38,.1);--od:rgba(234,88,12,.1);
  --bld:rgba(37,99,235,.1);--ad:rgba(200,154,0,.1);--pud:rgba(147,51,234,.1);
  --t1:#111118;--t2:#55556a;--t3:#aaaabc;
}
.theme-toggle{
  width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;
  background:var(--b2);position:relative;transition:background .2s;flex-shrink:0;
}
.theme-toggle::after{
  content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;
  border-radius:50%;background:var(--t2);transition:all .2s;
}
[data-theme="light"] .theme-toggle{background:var(--acc);}
[data-theme="light"] .theme-toggle::after{left:19px;background:#fff;}
.theme-icon{font-size:13px;line-height:1;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100vh;}
body{font-family:var(--font);background:var(--bg);color:var(--t1);font-size:14px;}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
.login-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r16);padding:2rem 1.75rem;width:100%;max-width:360px;}
.login-logo{font-size:11px;font-weight:800;letter-spacing:.2em;color:var(--acc);text-transform:uppercase;margin-bottom:1.5rem;}
.login-title{font-size:20px;font-weight:800;margin-bottom:.25rem;}
.login-sub{font-size:12px;color:var(--t2);margin-bottom:1.5rem;}
.field{margin-bottom:1rem;}
.field label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);display:block;margin-bottom:.4rem;}
.field input,.field select,.field textarea{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r8);padding:11px 12px;font-family:var(--font);font-size:14px;color:var(--t1);outline:none;}
.field input:focus,.field select:focus{border-color:var(--acc);}
.field textarea{resize:none;}
.btn{width:100%;padding:12px;background:var(--acc);border:none;border-radius:var(--r8);font-family:var(--font);font-size:14px;font-weight:800;color:#000;cursor:pointer;}
.btn:active{background:var(--acc2);}
.err-msg{font-size:12px;color:var(--r);text-align:center;margin-top:.75rem;min-height:18px;}
#app{display:none;flex-direction:column;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;background:var(--s1);border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:20;}
.tb-brand{font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--acc);text-transform:uppercase;}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-sync{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--t3);}
.sdot.ok{background:var(--g);box-shadow:0 0 8px rgba(61,214,140,.5);}
.sdot.err{background:var(--r);}
.btn-sm{padding:5px 11px;border-radius:var(--r8);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--b1);background:var(--s2);color:var(--t2);}
.btn-sm.danger{border-color:rgba(248,113,113,.3);color:var(--r);}
.btn-sm.accent{border-color:rgba(240,192,64,.3);color:var(--acc);}
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--b1);overflow-x:auto;padding:0 1rem;}
.tab{padding:10px 14px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
.tab:hover{color:var(--t1);}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);}
.content{flex:1;overflow-y:auto;padding:1rem 1.25rem .5rem;}
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:1rem;}
.kcard{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r12);padding:.85rem 1rem;}
.klbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t2);margin-bottom:.3rem;}
.kval{font-family:var(--mono);font-size:22px;font-weight:500;line-height:1.1;}
.ksub{font-size:10px;color:var(--t3);margin-top:.2rem;}
.tcard{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r12);overflow:hidden;margin-bottom:1rem;}
.thead-row{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;border-bottom:1px solid var(--b1);}
.thead-title{font-size:12px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{padding:7px 10px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--t2);border-bottom:1px solid var(--b1);}
td{padding:9px 10px;border-bottom:1px solid rgba(42,42,50,.5);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;}
.chip.g{background:var(--gd);color:var(--g);}
.chip.r{background:var(--rd);color:var(--r);}
.chip.a{background:var(--ad);color:var(--acc);}
.chip.o{background:var(--od);color:var(--o);}
.chip.b{background:var(--bld);color:var(--bl);}
.chip.pu{background:var(--pud);color:var(--pu);}
.flist{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
.fcard{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r12);padding:.9rem 1rem;}
.frow{display:flex;align-items:center;gap:10px;margin-bottom:.6rem;}
.fav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}
.fname{font-size:14px;font-weight:700;}
.fcargo{font-size:11px;color:var(--t2);}
.fstats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:.6rem;}
.fstat{background:var(--s2);border-radius:var(--r8);padding:5px 7px;}
.fstat-l{font-size:9px;color:var(--t3);}
.fstat-v{font-family:var(--mono);font-size:12px;font-weight:500;margin-top:1px;}
.factions{display:flex;gap:5px;}
.btn-xs{padding:5px 9px;font-size:11px;font-weight:600;border-radius:var(--r8);border:1px solid var(--b1);background:var(--s2);color:var(--t2);cursor:pointer;font-family:var(--font);}
.bfunc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r12);padding:.9rem 1rem;margin-bottom:.9rem;}
.bfunc-head{display:flex;align-items:center;gap:10px;padding-bottom:.75rem;margin-bottom:.75rem;border-bottom:1px solid var(--b1);}
.bfunc-info{flex:1;}
.bfunc-name{font-size:15px;font-weight:800;}
.bfunc-sub{font-size:11px;color:var(--t2);}
.bfunc-saldo{text-align:right;}
.bfunc-saldo-lbl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;}
.bfunc-saldo-val{font-family:var(--mono);font-size:20px;font-weight:600;}
.bsemana{margin-bottom:.75rem;}
.bsemana-head{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--b2);margin-bottom:4px;}
.bsemana-lbl{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:.05em;text-transform:uppercase;}
.bsemana-saldo{font-family:var(--mono);font-size:11px;font-weight:600;}
.bdia{display:flex;align-items:center;gap:4px;padding:6px 0;border-bottom:1px solid rgba(42,42,50,.3);}
.bdia:last-child{border-bottom:none;}
.bdia-data{font-size:11px;color:var(--t2);width:58px;flex-shrink:0;}
.bdia-batidas{flex:1;display:flex;flex-wrap:nowrap;gap:2px;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.bdia-batidas::-webkit-scrollbar{display:none;}
.bbat{font-family:var(--mono);font-size:11px;cursor:pointer;padding:1px 3px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.bbat.ent{color:var(--g);}
.bbat.sai{color:var(--r);}
.bbat.edit{color:var(--pu);text-decoration:underline dotted;}
.bbat:hover{opacity:.75;}
.bdia-hrs{font-family:var(--mono);font-size:10px;color:var(--t2);width:38px;text-align:right;flex-shrink:0;}
.bdia-saldo{font-family:var(--mono);font-size:10px;width:48px;text-align:right;flex-shrink:0;}
@media(max-width:480px){
  .bfunc-saldo-val{font-size:16px;}
  .bsemana-lbl{font-size:9px;}
  .filter-bar select{font-size:11px;padding:6px 8px;}
  .bdia-data{width:52px;font-size:10px;}
  .tabs{padding:0 .5rem;}
  .tab{padding:10px 10px;font-size:11px;}
  .content{padding:.75rem .75rem .5rem;}
  .bfunc{padding:.75rem .75rem;}
}
@media(min-width:900px){
  body{font-size:16px;}
  .content{max-width:100%;padding:1.5rem 3rem;}
  .kgrid{grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:1.5rem;}
  .kcard{padding:1.5rem 1.75rem;border-radius:16px;}
  .kval{font-size:36px;}
  .klbl{font-size:12px;margin-bottom:.5rem;}
  .ksub{font-size:12px;margin-top:.4rem;}
  .tcard{margin-bottom:1.5rem;border-radius:16px;}
  .thead-row{padding:.85rem 1.25rem;}
  .thead-title{font-size:15px;}
  th{padding:11px 16px;font-size:12px;}
  td{padding:14px 16px;font-size:15px;}
  .flist{gap:16px;}
  .fcard{padding:1.5rem 1.75rem;border-radius:16px;}
  .frow{margin-bottom:1rem;}
  .fname{font-size:18px;}
  .fcargo{font-size:13px;}
  .fstats{gap:10px;margin-bottom:1rem;}
  .fstat{padding:10px 14px;border-radius:10px;}
  .fstat-l{font-size:11px;}
  .fstat-v{font-size:16px;margin-top:3px;}
  .factions{gap:8px;}
  .btn-xs{padding:8px 16px;font-size:13px;border-radius:8px;}
  .fav{width:48px;height:48px;font-size:18px;}
  .bfunc{padding:1.5rem 1.75rem;border-radius:16px;margin-bottom:1.25rem;}
  .bfunc-head{margin-bottom:1rem;padding-bottom:1rem;}
  .bfunc-name{font-size:18px;}
  .bfunc-sub{font-size:13px;}
  .bfunc-saldo-lbl{font-size:11px;}
  .bfunc-saldo-val{font-size:28px;}
  .bdia{padding:8px 0;gap:10px;}
  .bdia-data{width:100px;font-size:13px;}
  .bbat{font-size:14px;padding:3px 7px;border-radius:4px;}
  .bdia-hrs{font-size:13px;width:60px;}
  .bdia-saldo{font-size:13px;width:70px;}
  .bsemana{margin-bottom:1rem;}
  .bsemana-head{padding:7px 0;margin-bottom:6px;}
  .bsemana-lbl{font-size:12px;}
  .bsemana-saldo{font-size:14px;}
  .tabs{padding:0 3rem;}
  .tab{padding:14px 22px;font-size:14px;}
  .topbar{padding:1rem 3rem;}
  .tb-brand{font-size:12px;}
  .filter-bar{gap:12px;margin-bottom:1.25rem;}
  .filter-bar select{font-size:14px;padding:10px 14px;border-radius:10px;}
  table{font-size:15px;}
  .chip{font-size:12px;padding:4px 10px;}
  .modal{max-width:520px;}
  .advcard{padding:1.25rem 1.5rem;margin-bottom:10px;border-radius:14px;}
  .atr-row{padding:10px 0;gap:12px;}
  .banner{font-size:13px;padding:9px 16px;margin-bottom:1.25rem;}
  .srow h3{font-size:16px;}
  .srow{margin-bottom:1rem;}
}
.advcard{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r12);padding:.85rem 1rem;margin-bottom:8px;}
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;padding:1rem;}
.moverlay.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r16);padding:1.5rem;width:100%;max-width:420px;}
.mhandle{display:none;}
.mtitle{font-size:16px;font-weight:800;margin-bottom:3px;}
.msub{font-size:12px;color:var(--t2);margin-bottom:1rem;}
.mactions{display:flex;gap:7px;margin-top:.9rem;}
.mactions .btn{flex:1;padding:10px;}
.srow{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.srow h3{font-size:13px;font-weight:700;}
.empty{text-align:center;padding:2.5rem;color:var(--t3);font-size:13px;}
.loading{text-align:center;padding:2rem;color:var(--t2);font-size:13px;}
.banner{border-radius:var(--r8);padding:7px 12px;font-size:11px;font-weight:500;margin-bottom:.9rem;text-align:center;}
.banner.ok{background:var(--gd);border:1px solid rgba(61,214,140,.2);color:var(--g);}
.banner.err{background:var(--rd);border:1px solid rgba(248,113,113,.2);color:var(--r);}
.filter-bar{display:flex;gap:8px;margin-bottom:.9rem;flex-wrap:wrap;}
.filter-bar select{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r8);padding:7px 10px;font-family:var(--font);font-size:12px;color:var(--t1);outline:none;cursor:pointer;flex:1;min-width:120px;}
.filter-bar select:focus{border-color:var(--acc);}
.atr-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(42,42,50,.3);}
.atr-row:last-child{border-bottom:none;}
</style>
</head>
<body>

<div id="login">
  <div class="login-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
      <div class="login-logo" style="margin-bottom:0">IW · Gestão de Ponto</div>
      <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema"></button>
    </div>
    <div class="login-title">Bem-vindo</div>
    <div class="login-sub">Área restrita — acesso autorizado</div>
    <div class="field"><label>Senha</label>
      <input type="password" id="lpw" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn" onclick="doLogin()">Entrar</button>
    <div class="err-msg" id="lerr"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tb-brand">IW · Ponto</div>
    <div class="tb-right">
      <div class="tb-sync"><span class="sdot" id="sdot"></span><span id="slbl">—</span></div>
      <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Alternar tema"></button>
      <button class="btn-sm danger" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="goTab('dash')" id="t-dash">Dashboard</div>
    <div class="tab" onclick="goTab('batidas')" id="t-batidas">Batidas</div>
    <div class="tab" onclick="goTab('banco')" id="t-banco">Banco de Horas</div>
    <div class="tab" onclick="goTab('atrasos')" id="t-atrasos">Atrasos</div>
    <div class="tab" onclick="goTab('equipe')" id="t-equipe">Equipe</div>
    <div class="tab" onclick="goTab('adv')" id="t-adv">Advertências</div>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- MODAL EDIT BATIDA -->
<div class="moverlay" id="m-edit">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Editar batida</div>
    <div class="msub" id="m-edit-sub"></div>
    <div class="field"><label>Hora (HH:MM)</label><input type="time" id="edit-hora"></div>
    <div class="field"><label>Tipo</label>
      <select id="edit-tipo"><option value="ENTRADA">ENTRADA</option><option value="SAIDA">SAÍDA</option></select>
    </div>
    <div class="mactions">
      <button class="btn-sm danger" onclick="deletarBatida()">Excluir</button>
      <button class="btn-sm" onclick="closeModals()">Cancelar</button>
      <button class="btn" onclick="salvarEdicao()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL ADD BATIDA -->
<div class="moverlay" id="m-add">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Adicionar batida</div>
    <div class="msub" id="m-add-sub"></div>
    <div class="field"><label>Hora (HH:MM)</label><input type="time" id="add-hora"></div>
    <div class="field"><label>Tipo</label>
      <select id="add-tipo"><option value="ENTRADA">ENTRADA</option><option value="SAIDA">SAÍDA</option></select>
    </div>
    <div class="mactions">
      <button class="btn-sm" onclick="closeModals()">Cancelar</button>
      <button class="btn" onclick="confirmarAdd()">Adicionar</button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR FUNC -->
<div class="moverlay" id="m-func-edit">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle" id="m-func-edit-title">Editar funcionário</div>
    <div class="msub" id="m-func-edit-sub"></div>
    <div class="field"><label>Salário mensal (R$)</label><input type="number" id="fe-salario" placeholder="0.00" step="0.01" min="0"></div>
    <div class="field"><label>Data de admissão</label><input type="date" id="fe-admissao"></div>
    <div class="field"><label>Data de aniversário</label><input type="date" id="fe-aniversario"></div>
    <div class="mactions">
      <button class="btn-sm" onclick="closeModals()">Cancelar</button>
      <button class="btn" onclick="saveFuncEdit()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL ADV -->
<div class="moverlay" id="m-adv">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Nova advertência</div>
    <div class="msub" id="m-adv-sub"></div>
    <div class="field"><label>Tipo</label>
      <select id="adv-tipo">
        <option>Falta injustificada</option><option>Atraso recorrente</option>
        <option>Conduta inadequada</option><option>Descumprimento de norma</option><option>Outro</option>
      </select>
    </div>
    <div class="field"><label>Descrição</label><textarea id="adv-desc" rows="3"></textarea></div>
    <div class="mactions">
      <button class="btn-sm" onclick="closeModals()">Cancelar</button>
      <button class="btn" onclick="saveAdv()">Registrar</button>
    </div>
  </div>
</div>

<!-- MODAL FUNC -->
<div class="moverlay" id="m-func">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Novo funcionário</div>
    <div class="msub">Cadastro manual</div>
    <div class="field"><label>Nome completo</label><input type="text" id="f-nome"></div>
    <div class="field"><label>Cargo</label><input type="text" id="f-cargo"></div>
    <div class="field"><label>PIN (4 dígitos)</label><input type="number" id="f-pin" maxlength="4"></div>
    <div class="field"><label>CPF (11 dígitos)</label><input type="text" id="f-cpf" maxlength="11"></div>
    <div class="field"><label>Salário mensal (R$)</label><input type="number" id="f-salario" placeholder="0.00" step="0.01"></div>
    <div class="field"><label>Data de admissão</label><input type="date" id="f-admissao"></div>
    <div class="field"><label>Data de aniversário</label><input type="date" id="f-aniversario"></div>
    <div class="mactions">
      <button class="btn-sm" onclick="closeModals()">Cancelar</button>
      <button class="btn" onclick="saveFunc()">Cadastrar</button>
    </div>
  </div>
</div>

// ===== HELPERS =====
function toMin(hhmm){if(!hhmm)return 0;const[h,m]=hhmm.split(':').map(Number);return h*60+m;}
function fromMin(min){
  const neg=min<0,abs=Math.abs(min);
  const h=Math.floor(abs/60),m=abs%60;
  return (neg?'-':'')+h+'h'+(m?(m<10?'0':'')+m+'min':'');
}
function fmtData(ds){
  const d=new Date(ds+'T12:00:00');
  return ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()]+' '+d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}
function getSemana(ds){
  const d=new Date(ds+'T12:00:00');
  const dow=d.getDay()===0?7:d.getDay();
  const seg=new Date(d);seg.setDate(d.getDate()-(dow-1));
  return seg.toISOString().split('T')[0];
}
function jornadaMin(ds){return JORNADA[new Date(ds+'T12:00:00').getDay()]||0;}
function isDiaCompleto(ds, bats){
  // Hoje nunca conta como débito — só conta no dia seguinte
  const hoje=new Date().toISOString().split('T')[0];
  if(ds>=hoje) return false; // hoje e futuro: nunca conta débito
  if(!bats||!bats.length) return true; // dia anterior sem registro = falta real
  const sorted=[...bats].sort((a,b)=>a.hora.localeCompare(b.hora));
  return true; // dia anterior com qualquer registro: conta o que tiver
}
function saidaPadrao(ds){return new Date(ds+'T12:00:00').getDay()===5?SAIDA_SEX:SAIDA_SEMANA;}

function calcTrab(bats){
  const s=[...bats].sort((a,b)=>a.hora.localeCompare(b.hora));
  let t=0;
  for(let i=0;i<s.length-1;i++){
    if(s[i].tipo==='ENTRADA'&&s[i+1].tipo==='SAIDA'){t+=toMin(s[i+1].hora)-toMin(s[i].hora);i++;}
  }
  return t;
}

function getPeriodo(p){
  const hoje=new Date(),hs=hoje.toISOString().split('T')[0];
  if(p==='semana') return {ini:getSemana(hs),fim:hs};
  if(p==='mes'){const m=hoje.toISOString().slice(0,7);return{ini:m+'-01',fim:hs};}
  if(p==='mes-ant'){
    const ma=new Date(hoje.getFullYear(),hoje.getMonth()-1,1);
    const mf=new Date(hoje.getFullYear(),hoje.getMonth(),0);
    return{ini:ma.toISOString().split('T')[0],fim:mf.toISOString().split('T')[0]};
  }
  return{ini:'2026-02-01',fim:hs};
}

async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function doLogin(){
  if(loginBlocked){document.getElementById('lerr').textContent='Bloqueado. Aguarde 1 minuto.';return;}
  const pw=document.getElementById('lpw').value;
  if(!pw){return;}
  const hash=await sha256(pw);
  if(hash===ADMIN_HASH){
    loginAttempts=0;
    document.getElementById('lpw').value='';
    document.getElementById('lerr').textContent='';
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.cssText='display:flex;flex-direction:column;';
    await initApp();goTab('dash');resetSession();
  } else {
    loginAttempts++;
    if(loginAttempts>=3){
      loginBlocked=true;
      document.getElementById('lerr').textContent='Bloqueado por 1 minuto.';
      setTimeout(()=>{loginBlocked=false;loginAttempts=0;document.getElementById('lerr').textContent='';},60000);
    } else {
      document.getElementById('lerr').textContent=`Senha incorreta. ${3-loginAttempts} tentativa(s).`;
    }
  }
}

  var todos=[];

  // Feeds trabalhistas brasileiros válidos
  var feeds=[
    {url:'https://www12.senado.leg.br/noticias/tags/Direitos%20Trabalhistas?tipoPaginacao=mais&pageSize=5&format=rss',fonte:'Senado Federal'},
    {url:'https://www.migalhas.com.br/rss/quentes',fonte:'Migalhas'}

            return {titulo:i.title,resumo:desc||'Clique para ler mais.',link:i.link,data:i.pubDate,fonte:fonte};
          }));

  // Se não conseguiu nada, mostra links úteis

      +'<div style="font-size:12px;color:var(--t2);margin-bottom:.75rem">Links úteis para consulta:</div>'
      +[
        {titulo:'Ministério do Trabalho e Emprego',url:'https://www.gov.br/trabalho-e-emprego',desc:'Legislação, portarias e notícias oficiais'},
        {titulo:'eSocial',url:'https://www.gov.br/esocial',desc:'Obrigações e tabelas atualizadas'},

      }).join('')
      +'</div>';

  // Monta o feed com as notícias encontradas
  newsCache=todos.slice(0,5).map(function(item){
    var data=item.data?new Date(item.data).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}):'';

function calcSaldoRegs(regs){
  const cpfsAtivos=new Set(funcionarios.map(f=>f.cpf));
  const mapa={};
  regs.forEach(r=>{
    if(!cpfsAtivos.has(r.cpf)) return;
    if(!mapa[r.cpf]) mapa[r.cpf]={};
    if(!mapa[r.cpf][r.data_local]) mapa[r.cpf][r.data_local]=[];
    mapa[r.cpf][r.data_local].push({hora:r.data_hora_local?.slice(11,16)||'00:00',tipo:r.tipo});
  });
  let total=0;
  const admissaoMap={};funcionarios.forEach(f=>{admissaoMap[f.cpf]=f.admissao||'2026-02-01';});
  Object.entries(mapa).forEach(([cpf,dias])=>{
    const adm=admissaoMap[cpf]||'2026-02-01';
    Object.entries(dias).forEach(([data,bats])=>{
      if(data<adm)return; // antes da admissão
      if(!isDiaUtil(data))return;
      if(!isDiaCompleto(data,bats))return;
      const j=jornadaMin(data);if(!j)return;
      total+=calcTrab(bats)-j;
    });
  });
  return total;
}

function renderRanking(regs){
  const el=document.getElementById('ranking');if(!el)return;
  const cpfsAtivos=new Set(funcionarios.map(f=>f.cpf));
  const fmap={};funcionarios.forEach(f=>{fmap[f.cpf]=f;});
  const stats={};
  regs.forEach(r=>{
    if(!r.cpf||!cpfsAtivos.has(r.cpf)) return;
    const f=fmap[r.cpf];if(!f)return;
    if(!stats[r.cpf]) stats[r.cpf]={nome:f.nome,atrasos:0,dias:new Set()};
    stats[r.cpf].dias.add(r.data_local);
    if(r.tipo==='ENTRADA'){
      const h=r.data_hora_local?.slice(11,16)||'00:00';
      if(toMin(h)<=toMin('10:00')&&toMin(h)-toMin(ENTRADA_PAD)>TOL) stats[r.cpf].atrasos++;
    }
  });
  const ranked=Object.entries(stats)
    .map(([cpf,s])=>({cpf,nome:s.nome||'—',atrasos:s.atrasos,dias:s.dias.size}))
    .sort((a,b)=>a.atrasos-b.atrasos||b.dias-a.dias);
  const medals=['🥇','🥈','🥉'];
  el.innerHTML=ranked.length?ranked.map((r,i)=>{
    const f=fmap[r.cpf]||{color:COLORS[i%7]};
    const nome=r.nome||'?';
    const cor=r.atrasos===0?'var(--g)':r.atrasos<3?'var(--o)':'var(--r)';
    return`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(42,42,50,.4)">
      <span style="font-size:10px;color:var(--t3);width:16px">${i+1}</span>
      <div style="width:28px;height:28px;border-radius:50%;background:${f.color}22;color:${f.color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">${nome[0]}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:700">${nome.split(' ')[0]} ${medals[i]||''}</div>
        <div style="font-size:10px;color:var(--t2)">${r.dias} dias trabalhados</div></div>
      <span style="font-family:var(--mono);font-size:12px;font-weight:600;color:${cor}">${r.atrasos===0?'Sem atrasos':r.atrasos+' atraso'+(r.atrasos>1?'s':'')}</span>
    </div>`;
  }).join(''):'<div class="empty">Sem dados este mês</div>';
}

async function reloadBatidas(){
  const el=document.getElementById('bat-body');if(!el)return;
  el.innerHTML='<div class="loading">Carregando...</div>';
  const per=document.getElementById('b-periodo')?.value||'mes';
  const cpfF=document.getElementById('b-func')?.value||'';
  const{ini,fim}=getPeriodo(per);
  // Busca em lotes para garantir todos os registros (Supabase limita a 1000 por vez)
  let todos=[];
  let from=0;
  while(true){
    let q=sb.from('iw_registros_ponto').select('*').gte('data_local',ini).lte('data_local',fim).order('id').range(from,from+999);
    if(cpfF) q=q.eq('cpf',cpfF);
    const{data:lote}=await q;
    if(!lote||!lote.length) break;
    todos=todos.concat(lote);
    if(lote.length<1000) break;
    from+=1000;
  }

  const porCpf={};
  todos.forEach(r=>{
    if(!porCpf[r.cpf]) porCpf[r.cpf]={nome:r.funcionario_nome,dias:{}};
    if(!porCpf[r.cpf].dias[r.data_local]) porCpf[r.cpf].dias[r.data_local]=[];
    porCpf[r.cpf].dias[r.data_local].push({id:r.id,nsr:r.nsr,hora:r.data_hora_local?.slice(11,16)||'00:00',tipo:r.tipo,origem:r.origem,cpf:r.cpf,nome:r.funcionario_nome,data:r.data_local});
  });

  const fmap={};funcionarios.forEach(f=>{fmap[f.cpf]=f;});
  const cpfsExib=cpfF?[cpfF]:funcionarios.map(f=>f.cpf);
  let html='';

  cpfsExib.forEach(cpf=>{
    const f=fmap[cpf];if(!f)return;
    const pf=porCpf[cpf]||{nome:f.nome,dias:{}};
    if(!Object.keys(pf.dias).length)return;

    const semanas={};
    Object.entries(pf.dias).forEach(([data,bats])=>{
      const sem=getSemana(data);
      if(!semanas[sem])semanas[sem]=[];
      semanas[sem].push({data,bats:[...bats].sort((a,b)=>a.hora.localeCompare(b.hora))});
    });

    let saldoTotal=0,semHtml='';
    Object.entries(semanas).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([semIni,dias])=>{
      let saldoSem=0,diasHtml='';
      dias.sort((a,b)=>a.data.localeCompare(b.data)).forEach(({data,bats})=>{
        const jMin=jornadaMin(data),trab=calcTrab(bats);
        const completo=isDiaCompleto(data,bats);
        const saldo=jMin&&completo?trab-jMin:jMin&&!completo&&trab>0?trab-jMin:0;
        saldoSem+=saldo;saldoTotal+=saldo;
        const batsHtml=bats.map(b=>{
          const isEdit=b.origem==='MANUAL'||b.origem==='EDITADO_MANUAL';
          const cls=isEdit?'edit':b.tipo==='ENTRADA'?'ent':'sai';
          const seta=b.tipo==='ENTRADA'?'↑':'↓';
          return`<span class="bbat ${cls}" onclick="abrirEdit(${JSON.stringify(b).replace(/"/g,'&quot;')})" title="${isEdit?'Editado manualmente·':''} Clique para editar">${b.hora}${seta}</span>`;
        }).join('<span style="color:var(--b2);font-size:9px">·</span>');
        const sc=saldo>=0?'var(--g)':saldo<-30?'var(--r)':'var(--o)';
        diasHtml+=`<div class="bdia">
          <span class="bdia-data">${fmtData(data)}</span>
          <div class="bdia-batidas">${batsHtml}
            <span onclick="abrirAdd('${data}','${cpf}','${f.nome.replace(/'/g,"\\'")}')" style="cursor:pointer;font-size:11px;color:var(--t3);padding:1px 3px;border-radius:3px;border:1px dashed var(--b2)" title="Adicionar batida">+</span>
          </div>
          <span class="bdia-hrs">${trab?fromMin(trab):'—'}</span>
          <span class="bdia-saldo" style="color:${jMin?sc:'var(--t3)'}">${jMin?(saldo>=0?'+':'')+fromMin(saldo):'—'}</span>
        </div>`;
      });
      const sf=new Date(semIni+'T12:00:00');sf.setDate(sf.getDate()+4);
      const sc=saldoSem>=0?'var(--g)':saldoSem<-30?'var(--r)':'var(--o)';
      semHtml+=`<div class="bsemana">
        <div class="bsemana-head">
          <span class="bsemana-lbl">Semana ${new Date(semIni+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}–${sf.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}</span>
          <span class="bsemana-saldo" style="color:${sc}">${saldoSem>=0?'+':''}${fromMin(saldoSem)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid var(--b2);margin-bottom:2px">
          <span style="font-size:9px;color:var(--t3);width:58px;flex-shrink:0">DIA</span>
          <span style="flex:1;font-size:9px;color:var(--t3)">BATIDAS &nbsp;<span style="color:var(--g)">↑ent</span> <span style="color:var(--r)">↓saí</span> <span style="color:var(--pu)">✎edit</span></span>
          <span style="font-size:9px;color:var(--t3);width:38px;text-align:right;flex-shrink:0">TOTAL</span>
          <span style="font-size:9px;color:var(--t3);width:48px;text-align:right;flex-shrink:0">SALDO</span>
        </div>
        ${diasHtml}</div>`;
    });

    const sc=saldoTotal>=0?'var(--g)':saldoTotal<-60?'var(--r)':'var(--o)';
    html+=`<div class="bfunc">
      <div class="bfunc-head">
        <div class="fav" style="background:${f.color}22;color:${f.color}">${f.nome[0]}</div>
        <div class="bfunc-info"><div class="bfunc-name">${f.nome.split(' ')[0]}</div><div class="bfunc-sub">${f.cargo||'—'} · ${Object.keys(pf.dias).length} dias</div></div>
        <div class="bfunc-saldo"><div class="bfunc-saldo-lbl">Saldo período</div><div class="bfunc-saldo-val" style="color:${sc}">${saldoTotal>=0?'+':''}${fromMin(saldoTotal)}</div></div>
      </div>${semHtml||'<div class="empty" style="padding:1rem">Sem registros</div>'}
    </div>`;
  });

  el.innerHTML=html||'<div class="empty">Nenhum registro no período</div>';
}

// Editar batida
function abrirEdit(b){
  editCtx=b;
  document.getElementById('m-edit-sub').textContent=`${b.nome?.split(' ')[0]} · ${fmtData(b.data)}`;
  document.getElementById('edit-hora').value=b.hora;
  document.getElementById('edit-tipo').value=b.tipo;
  document.getElementById('m-edit').classList.add('open');
}
async function salvarEdicao(){
  if(!editCtx)return;
  const hora=document.getElementById('edit-hora').value;
  const tipo=document.getElementById('edit-tipo').value;
  if(!hora){alert('Informe a hora.');return;}
  const {data:updData, error:errUpd}=await sb.from('iw_registros_ponto').update({
    data_hora_local:editCtx.data+'T'+hora,
    tipo,
    origem:'EDITADO_MANUAL',
    sincronizado_em:new Date().toISOString()
  }).eq('id',editCtx.id).select();
  if(errUpd){alert('Erro ao salvar: '+errUpd.message);return;}
  if(!updData||updData.length===0){
    // Tenta buscar pelo nsr como fallback
    if(editCtx.nsr){
      await sb.from('iw_registros_ponto').update({
        data_hora_local:editCtx.data+'T'+hora,tipo,origem:'EDITADO_MANUAL',
        sincronizado_em:new Date().toISOString()
      }).eq('nsr',editCtx.nsr).select();
    }
  }
  closeModals();
  await reloadBatidas();
}
async function deletarBatida(){
  if(!editCtx||!confirm('Excluir esta batida?'))return;
  const {error:errDel}=await sb.from('iw_registros_ponto').delete().eq('id',editCtx.id).select();
  if(errDel){alert('Erro ao excluir: '+errDel.message);return;}
  closeModals();await reloadBatidas();
}

// Adicionar batida
function abrirAdd(data,cpf,nome){
  addCtx={data,cpf,nome};
  document.getElementById('m-add-sub').textContent=`${nome.split(' ')[0]} · ${fmtData(data)}`;
  document.getElementById('add-hora').value='';
  document.getElementById('m-add').classList.add('open');
}
async function confirmarAdd(){
  if(!addCtx)return;
  const hora=document.getElementById('add-hora').value;
  const tipo=document.getElementById('add-tipo').value;
  if(!hora)return;
  const {error:errIns}=await sb.from('iw_registros_ponto').insert({
    id:Date.now(),nsr:null,funcionario_id:null,
    funcionario_nome:addCtx.nome,cpf:addCtx.cpf,
    data_hora:new Date().toISOString(),
    data_hora_local:addCtx.data+'T'+hora,
    data_local:addCtx.data,tipo,origem:'MANUAL',
    sincronizado_em:new Date().toISOString()
  }).select();
  if(errIns){alert('Erro ao adicionar: '+errIns.message);return;}
  closeModals();await reloadBatidas();
}

async function editPin(id,nome){
  const np=prompt(`PIN para ${nome.split(' ')[0]} (4 dígitos):`);
  if(!np||np.length!==4||isNaN(parseInt(np))){alert('PIN inválido.');return;}
  if(funcionarios.find(f=>f.pin===np&&f.id!==id)){alert('PIN já em uso.');return;}
  await sb.from('iw_funcionarios').update({pin:np}).eq('id',id);
  await loadBase();renderEquipe(document.getElementById('content'));
}

// ===== ADVERTÊNCIAS =====
async function renderEquipe(c){
  c.innerHTML=`<div class="srow"><h3>Funcionários (${funcionarios.length})</h3><button class="btn-sm accent" onclick="document.getElementById('m-func').classList.add('open')">+ Novo</button></div><div class="flist" id="flist"></div>`;
  const g=document.getElementById('flist');
  if(!funcionarios.length){g.innerHTML='<div class="empty">Nenhum funcionário.</div>';return;}
  funcionarios.forEach(f=>{
    const af=advertencias.filter(a=>a.funcionario_id===f.id).length;
    const d=document.createElement('div');d.className='fcard';
    const fmtDate=ds=>{if(!ds)return'—';const[y,m,dv]=ds.split('-');return dv+'/'+m+'/'+y;};
    const fmtAniv=ds=>{if(!ds)return'—';const[y,m,dv]=ds.split('-');return dv+'/'+m;};
    const salStr=f.salario?'R$ '+Number(f.salario).toLocaleString('pt-BR'):'—';
    const vhStr=f.salario?'R$ '+(f.salario/220).toFixed(2):'—';
    d.innerHTML=`<div class="frow">
      <div class="fav" style="background:${f.color}22;color:${f.color}">${f.nome[0]}</div>
      <div style="flex:1"><div class="fname">${f.nome.split(' ')[0]}</div>
        <div class="fcargo">${f.cargo||'—'} · CPF <span style="font-family:var(--mono)">${f.cpf||'—'}</span></div></div>
    </div>
    <div class="fstats" style="grid-template-columns:1fr 1fr 1fr">
      <div class="fstat"><div class="fstat-l">Admissão</div><div class="fstat-v" style="font-size:11px">${fmtDate(f.admissao)}</div></div>
      <div class="fstat"><div class="fstat-l">🎂 Aniversário</div><div class="fstat-v" style="font-size:11px">${fmtAniv(f.aniversario)}</div></div>
      <div class="fstat"><div class="fstat-l">Advertências</div><div class="fstat-v" style="color:${af?'var(--o)':'var(--t1)'}">${af}</div></div>
    </div>
    <div class="fstats" style="grid-template-columns:1fr 1fr 1fr;margin-top:0">
      <div class="fstat">
        <div class="fstat-l" style="display:flex;align-items:center;justify-content:space-between">Salário <span onclick="toggleSalario(this)" style="cursor:pointer;font-size:12px">👁</span></div>
        <div class="fstat-v sal-hidden" style="color:var(--g);filter:blur(5px);transition:filter .2s">${salStr}</div>
      </div>
      <div class="fstat">
        <div class="fstat-l">Valor/hora</div>
        <div class="fstat-v sal-hidden" style="filter:blur(5px);transition:filter .2s">${vhStr}</div>
      </div>
      <div class="fstat"><div class="fstat-l">Carga semanal</div><div class="fstat-v">44h</div></div>
    </div>
    <div class="factions">
      <button class="btn-xs" style="color:var(--acc);border-color:rgba(240,192,64,.3)" onclick="editPin(${f.id})">PIN</button>
      <button class="btn-xs" style="color:var(--g);border-color:rgba(61,214,140,.3)" onclick="editSalario(${f.id})">Editar</button>
      <button class="btn-xs" style="color:var(--o);border-color:rgba(251,146,60,.3)" onclick='openModalAdv({id:${f.id},nome:"${f.nome}",cpf:"${f.cpf||''}"})'>+ Adv.</button>
    </div>`;
    g.appendChild(d);
  });
}

function renderAdv(c){
  c.innerHTML=`<div class="srow"><h3>Advertências</h3><span style="font-size:11px;color:var(--t2)">${advertencias.length} total</span></div><div id="al"></div>`;
  const al=document.getElementById('al');
  if(!advertencias.length){al.innerHTML='<div class="empty">Nenhuma advertência.</div>';return;}
  advertencias.forEach(a=>{
    al.innerHTML+=`<div class="advcard">
      <div style="font-size:13px;font-weight:700;margin-bottom:3px">${(a.funcionario_nome||'').split(' ')[0]} <span class="chip o">${a.tipo||''}</span></div>
      <div style="font-size:12px;color:var(--t2);line-height:1.5">${a.descricao||'Sem descrição'}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
        <span style="font-size:11px;color:var(--t3)">${a.data_registro||''}</span>
        <button class="btn-xs" style="color:var(--r);border-color:rgba(248,113,113,.3)" onclick="delAdv(${a.id})">Remover</button>
      </div></div>`;
  });
}
async function delAdv(id){
  await sb.from('iw_advertencias').delete().eq('id',id);
  advertencias=advertencias.filter(a=>a.id!==id);
  renderAdv(document.getElementById('content'));
}

// ===== MODAIS =====
function openModalAdv(func){currentAdvFunc=func;document.getElementById('m-adv-sub').textContent='Funcionário: '+func.nome.split(' ')[0];document.getElementById('m-adv').classList.add('open');}
function closeModals(){document.querySelectorAll('.moverlay').forEach(m=>m.classList.remove('open'));currentAdvFunc=null;editCtx=null;addCtx=null;}
document.querySelectorAll('.moverlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModals();}));

async function saveAdv(){
  if(!currentAdvFunc)return;
  const adv={id:Date.now(),funcionario_id:currentAdvFunc.id,funcionario_nome:currentAdvFunc.nome,tipo:document.getElementById('adv-tipo').value,descricao:document.getElementById('adv-desc').value,data_registro:new Date().toLocaleDateString('pt-BR'),criado_em:new Date().toISOString()};
  await sb.from('iw_advertencias').upsert(adv);
  advertencias.unshift(adv);document.getElementById('adv-desc').value='';closeModals();
  if(currentTab==='adv')renderAdv(document.getElementById('content'));
}
async function saveFunc(){
  const nome=document.getElementById('f-nome').value.trim();
  const cargo=document.getElementById('f-cargo').value.trim();
  const pv=document.getElementById('f-pin').value.trim();
  const cpf=document.getElementById('f-cpf').value.trim();
  if(!nome||!cargo||pv.length!==4||isNaN(parseInt(pv))){alert('Preencha nome, cargo e PIN.');return;}
  if(funcionarios.find(f=>f.pin===pv)){alert('PIN já em uso.');return;}
  const sal=parseFloat(document.getElementById('f-salario').value)||0;
  const adm=document.getElementById('f-admissao').value||new Date().toISOString().split('T')[0];
  const aniv=document.getElementById('f-aniversario').value||null;
  await sb.from('iw_funcionarios').insert({id:Date.now(),nome,cargo,pin:pv,cpf,carga:9,ativo:true,salario:sal,admissao:adm,aniversario:aniv,atualizado_em:new Date().toISOString()});
  ['f-nome','f-cargo','f-pin','f-cpf','f-salario','f-admissao','f-aniversario'].forEach(id=>document.getElementById(id).value='');
  closeModals();await loadBase();renderEquipe(document.getElementById('content'));
}

async function renderAtrasos(c){
  c.innerHTML=`<div class="filter-bar"><select id="atr-per" onchange="reloadAtrasos()">
    <option value="mes">Mês atual</option><option value="semana">Esta semana</option>
    <option value="mes-ant">Mês anterior</option><option value="tudo">Total geral</option>
  </select></div><div id="atr-body"><div class="loading">Carregando...</div></div>`;
  await reloadAtrasos();
}
async function reloadAtrasos(){
  const el=document.getElementById('atr-body');if(!el)return;
  el.innerHTML='<div class="loading">Calculando...</div>';
  const per=document.getElementById('atr-per')?.value||'mes';
  const{ini,fim}=getPeriodo(per);
  const{data:regs}=await sb.from('iw_registros_ponto').select('*').gte('data_local',ini).lte('data_local',fim).order('id').limit(5000);
  const todos=regs||[];
  const porCpf={};
  todos.forEach(r=>{
    if(!porCpf[r.cpf])porCpf[r.cpf]={nome:r.funcionario_nome,dias:{}};
    if(!porCpf[r.cpf].dias[r.data_local])porCpf[r.cpf].dias[r.data_local]=[];
    porCpf[r.cpf].dias[r.data_local].push({hora:r.data_hora_local?.slice(11,16)||'00:00',tipo:r.tipo});
  });
  let html='<div class="flist">';
  funcionarios.forEach((f)=>{
    const pf=porCpf[f.cpf]||{dias:{}};
    const ocorrencias=[];
    const admF=f.admissao||'2026-02-01';
    const dIni=new Date((ini<admF?admF:ini)+'T12:00:00'),dFim=new Date(fim+'T12:00:00');
    const hoje=new Date().toISOString().split('T')[0];
    for(let dia=new Date(dIni);dia<=dFim;dia.setDate(dia.getDate()+1)){
      const ds=dia.toISOString().split('T')[0];
      if(!isDiaUtil(ds)||ds>=hoje)continue;
      const bats=pf.dias[ds];
      if(!bats||!bats.length){ocorrencias.push({tipo:'falta',data:ds,desc:'Falta — sem registro no dia'});continue;}
      const sorted=[...bats].sort((a,b)=>a.hora.localeCompare(b.hora));
      const ent=sorted.find(b=>b.tipo==='ENTRADA'&&toMin(b.hora)<=toMin('10:00'));
      if(ent){const at=toMin(ent.hora)-toMin(ENTRADA_PAD);if(at>TOL)ocorrencias.push({tipo:'atraso',data:ds,desc:`Entrada às ${ent.hora} — ${at} min de atraso`});}
      const saidas=sorted.filter(b=>b.tipo==='SAIDA'&&toMin(b.hora)>=toMin('15:00'));
      const ultSaida=saidas[saidas.length-1];
      if(ultSaida){const pad=saidaPadrao(ds);const diff=toMin(pad)-toMin(ultSaida.hora);if(diff>TOL)ocorrencias.push({tipo:'saida',data:ds,desc:`Saída às ${ultSaida.hora} — ${diff} min antes`});}
    }
    if(!ocorrencias.length){
      html+=`<div class="fcard"><div class="frow"><div class="fav" style="background:${f.color}22;color:${f.color}">${f.nome[0]}</div><div style="flex:1"><div class="fname">${f.nome.split(' ')[0]}</div><div class="fcargo">${f.cargo||'—'}</div></div><span class="chip g">Sem ocorrências</span></div></div>`;
      return;
    }
    const nA=ocorrencias.filter(o=>o.tipo==='atraso').length;
    const nF=ocorrencias.filter(o=>o.tipo==='falta').length;
    const nS=ocorrencias.filter(o=>o.tipo==='saida').length;
    const itens=ocorrencias.map(o=>{
      const cls=o.tipo==='falta'?'r':o.tipo==='atraso'?'o':'b';
      const icon=o.tipo==='falta'?'✕':o.tipo==='atraso'?'↑':'↓';
      return `<div class="atr-row"><span class="chip ${cls}">${icon}</span><span style="font-size:11px;color:var(--t2);width:72px;flex-shrink:0">${fmtData(o.data)}</span><span style="font-size:12px;flex:1">${o.desc}</span></div>`;
    }).join('');
    html+=`<div class="fcard"><div class="frow"><div class="fav" style="background:${f.color}22;color:${f.color}">${f.nome[0]}</div><div style="flex:1"><div class="fname">${f.nome.split(' ')[0]}</div><div class="fcargo">${f.cargo||'—'}</div></div><div style="display:flex;gap:5px">${nA?`<span class="chip o">${nA} atraso${nA>1?'s':''}</span>`:''} ${nF?`<span class="chip r">${nF} falta${nF>1?'s':''}</span>`:''} ${nS?`<span class="chip b">${nS} saída ant.</span>`:''}</div></div><div style="border-top:1px solid var(--b1);margin-top:.5rem;padding-top:.5rem">${itens}</div></div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

</script>
